          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <Donut segments={Object.entries(STATUS).map(([k,v])=>({v:my.filter(j=>j.status===k).length,c:v.c}))} size={80}/>
            <div style={{flex:1}}>
              {Object.entries(STATUS).map(([k,v])=>{const n=my.filter(j=>j.status===k).length;return n>0&&<div key={k} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <div style={{width:10,height:10,borderRadius:2,background:v.c,flexShrink:0}}/>
                <span style={{fontSize:12,color:DK.txt3(),flex:1}}>{v[lang]||v.en}</span>

            </div>
          </div>
        </div>
        {/* Priority donut */}
        <div style={{background:DK.bg(),borderRadius:12,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:13,fontWeight:700,color:DK.txt(),marginBottom:12}}>🎯 {lang==="lo"?"ລະດັບ":"Priority"}</div>
          <Donut segments={priBreak} size={70}/>
          <div style={{marginTop:6}}>
            {priBreak.filter(p=>p.v>0).map(p=><div key={p.l} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:DK.txt4(),marginBottom:2}}>
              <span>{p.l}</span><span style={{fontWeight:700,color:p.c}}>{p.v}</span>
            </div>)}
          </div>
        </div>
      </div>

      {/* Overdue + Blocked alerts */}
      {(overdue.length>0||blocked.length>0)&&<div style={{background:"#fef2f2",borderRadius:12,padding:16,marginBottom:16,border:"1px solid #fecaca"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:8}}>⚠ {lang==="lo"?"ຕ້ອງການຄວາມສົນໃຈ":"Needs Attention"} ({overdue.length+blocked.length})</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {[...overdue,...blocked].map(j=><div key={j.id} style={{background:DK.bg(),borderRadius:8,padding:"7px 12px",border:"1px solid #fca5a5",fontSize:12}}>

            <span style={{marginLeft:6,fontSize:11,color:"#dc2626"}}>{j.status==="blocked"?"Blocked":"⚠ "+cleanDate(j.due_date)}</span>
          </div>)}
        </div>
      </div>}

      {/* Job list - grouped by project, no hours, show notes */}
      <div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${DK.bdr3()}`,fontSize:13,fontWeight:700,color:DK.txt()}}>{lang==="lo"?"ລາຍລະອຽດວຽກ":"Job Details"} ({my.length})</div>
        {Object.entries(my.reduce((acc,j)=>{const k=j.project_id||"__none__";if(!acc[k])acc[k]=[];acc[k].push(j);return acc;},{})).map(([pid,pjobs])=>{
          const pname=projects.find(p=>p.id===pid)?.name||(lang==="lo"?"ບໍ່ມີໂຄງການ":"No Project");
          return <div key={pid}>
            <div style={{padding:"8px 16px",background:DK.bg3(),borderBottom:`1px solid ${DK.bdr2()}`,fontSize:12,fontWeight:700,color:DK.txt3()}}>📂 {pname}</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:DK.bg2()}}>{["Job / Notes","Category","Status","Priority","Due","%"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",color:DK.txt4(),fontWeight:700,fontSize:10,textTransform:"uppercase",borderBottom:`1px solid ${DK.bdr2()}`}}>{h}</th>)}</tr></thead>
              <tbody>
                {pjobs.sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9)).map(j=>{const od=new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done";const pg=Number(j.progress)||0;
                return <tr key={j.id} style={{borderBottom:"1px solid #f8fafc"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>

                  </td>
                  <td style={{padding:"9px 12px"}}><span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:"#f0f9ff",color:"#0369a1",fontWeight:600}}>{j.category||"—"}</span></td>
                  <td style={{padding:"9px 12px"}}><Badge status={j.status} lang={lang}/></td>
                  <td style={{padding:"9px 12px"}}><PriDot priority={j.priority} lang={lang}/></td>
                  <td style={{padding:"9px 12px",color:od?"#dc2626":"#64748b",fontSize:11,fontWeight:od?700:400,whiteSpace:"nowrap"}}>{od?"⚠ ":""}{cleanDate(j.due_date)}</td>
                  <td style={{padding:"9px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <div style={{width:50,height:4,background:DK.bg3(),borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pg}%`,background:pg===100?"#16a34a":"#3b82f6",borderRadius:99}}/></div>

                    </div>
                  </td>
                </tr>;})}
              </tbody>
            </table>
          </div>;
        })}
      </div>
    </div>;
  };

  // ── TAB: TEAM ──────────────────────────────────────────────
  const TeamReport=()=>{
    const [fTeamUser,setFTeamUser]=useState("all");
    const baseJobs=period==="all"?jobs:jobs.filter(inPeriod);
    const pJobs=fTeamUser==="all"?baseJobs:baseJobs.filter(j=>j.assignee_id===fTeamUser);
    const totalDone=pJobs.filter(j=>j.status==="done").length;
    const totalOverdue=pJobs.filter(j=>new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done").length;
    const totalHrs=pJobs.reduce((s,j)=>s+(Number(j.actual_hours)||0),0);
    const totalEst=pJobs.reduce((s,j)=>s+(Number(j.estimated_hours)||0),0);

    const staffStats=users.map(u=>{
      const uj=pJobs.filter(j=>j.assignee_id===u.id);
      const udone=uj.filter(j=>j.status==="done");
      const uod=uj.filter(j=>new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done");
      const avgPg=avgNum(uj.map(j=>Number(j.progress)||0));
      return {u,total:uj.length,done:udone.length,overdue:uod.length,avgPg,compRate:pct(udone.length,uj.length)};
    }).filter(s=>s.total>0).sort((a,b)=>b.compRate-a.compRate);

    const projStats=projects.map(p=>{
      const pj=pJobs.filter(j=>j.project_id===p.id);
      const pd=pj.filter(j=>j.status==="done");
      return {p,total:pj.length,done:pd.length,pct:pct(pd.length,pj.length)};
    }).filter(s=>s.total>0);

    const catHeat={};pJobs.forEach(j=>{const c=j.category||"Other";if(!catHeat[c])catHeat[c]={total:0,done:0};catHeat[c].total++;if(j.status==="done")catHeat[c].done++;});
    const catArr=Object.entries(catHeat).sort((a,b)=>b[1].total-a[1].total).slice(0,8);

    const printReport=()=>{
      const staffRows=staffStats.map(s=>`<tr><td>${s.u.name}</td><td>${s.u.department}</td><td>${s.total}</td><td>${s.done}</td><td>${s.compRate}%</td><td>${s.overdue}</td><td>${s.avgPg}%</td></tr>`).join("");
      // Per-project sections with jobs
      const projSections=projects.map(p=>{
        const pj=pJobs.filter(j=>j.project_id===p.id);
        if(!pj.length)return "";
        const dn=pj.filter(j=>j.status==="done").length;
        const rows=pj.sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9)).map(j=>`
          <tr>
            <td><strong>${lang==="lo"&&j.title_lao?j.title_lao:j.title}</strong>${renderNotesHTML(j.notes)}</td>

            <td><span class="badge ${j.status}">${STATUS[j.status]?.en||j.status}</span></td>
            <td class="p ${j.priority}">${j.priority}</td>
            <td>${cleanDate(j.due_date)}</td>
            <td>${j.progress||0}%</td>
          </tr>`).join("");
        return `<h2 style="border-left:4px solid #2563eb;padding-left:10px;margin-top:22px">${lang==="lo"&&p.name_lao?p.name_lao:p.name} <span style="font-size:11px;color:#64748b;font-weight:400">${dn}/${pj.length} done · ${pct(dn,pj.length)}%</span></h2>
          <table><thead><tr><th>Job / Notes</th><th>Assignee</th><th>Status</th><th>Priority</th><th>Due</th><th>%</th></tr></thead><tbody>${rows}</tbody></table>`;

      const filterNote=fTeamUser!=="all"?` · Staff: ${users.find(u=>u.id===fTeamUser)?.name||""}`:"";
      exportReport("Team Report",`

          <div class="stat" style="border-color:#16a34a"><div class="n">${totalDone}</div><div class="l">Completed</div></div>

        ${projSections}
      `);
    };

    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:15,fontWeight:700,color:DK.txt()}}>{lang==="lo"?"ລາຍງານທີມ":"Team Performance Report"}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={fTeamUser} onChange={e=>setFTeamUser(e.target.value)}
            style={{...SS(),minWidth:140,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
            <option value="all">{lang==="lo"?"ທຸກຄົນ":"All Staff"}</option>
            {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}

      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        {/* Staff performance table */}
        <div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${DK.bdr3()}`,fontSize:13,fontWeight:700,color:DK.txt()}}>👤 {lang==="lo"?"ປະສິດທິພາບ":"Staff"}</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:DK.bg2()}}>{["Name","Total","Done","%","OD"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",color:DK.txt4(),fontWeight:700,fontSize:10,textTransform:"uppercase",borderBottom:`1px solid ${DK.bdr2()}`}}>{h}</th>)}</tr></thead>
            <tbody>

                <td style={{padding:"9px 12px",color:"#16a34a",fontWeight:600}}>{s.done}</td>
                <td style={{padding:"9px 12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>

            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <div style={{fontWeight:600,color:DK.txt2(),fontSize:12}}>{s.p.name}</div>

        <div style={{fontSize:13,fontWeight:700,color:DK.txt(),marginBottom:14}}>🔥 {lang==="lo"?"ໂຖໂດຍໝວດ":"Workload by Category"}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {catArr.map(([cat,data])=>{const cr=pct(data.done,data.total);const heat=cr>=80?"#dcfce7":cr>=50?"#fef3c7":"#fee2e2";
          return <div key={cat} style={{background:heat,borderRadius:8,padding:"10px 12px",border:`1px solid ${cr>=80?"#bbf7d0":cr>=50?"#fde68a":"#fecaca"}`}}>
            <div style={{fontSize:12,fontWeight:700,color:DK.txt2(),marginBottom:3}}>{cat}</div>
            <div style={{fontSize:11,color:DK.txt4()}}>{data.done}/{data.total} · {cr}%</div>

        </div>
      </div>
    </div>;

  // ── TAB: OVERDUE & RISK ────────────────────────────────────
  const RiskReport=()=>{
    const overdueAll=jobs.filter(j=>new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done").sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9));
    const blocked=jobs.filter(j=>j.status==="blocked");
    const stale=jobs.filter(j=>{
      if(j.status==="done"||j.status==="todo")return false;
      const upd=new Date(String(j.updated_at||j.created_at||"").slice(0,10));
      const diff=Math.round((now-upd)/(1000*60*60*24));
      return diff>7;
    });
    const noProgress=jobs.filter(j=>j.status==="in-progress"&&(Number(j.progress)||0)===0);

    const printReport=()=>{
      const odRows=overdueAll.map(j=>`<tr>
        <td><strong>${lang==="lo"&&j.title_lao?j.title_lao:j.title}</strong>${renderNotesHTML(j.notes)}</td>
        <td>${getUser(j.assignee_id)?.name||"?"}</td>
        <td>${projects.find(p=>p.id===j.project_id)?.name||"—"}</td>
        <td class="p ${j.priority}">${j.priority}</td>
        <td style="color:#dc2626">${cleanDate(j.due_date)}</td>
        <td>${j.status}</td>
      </tr>`).join("");
      exportReport("Risk & Overdue Report",`
        <h1>⚠ Risk & Overdue Report</h1>
        <div class="meta">Generated: ${now.toLocaleDateString()} · Manager: ${user.name}</div>
        <div class="stat-grid">
          <div class="stat" style="border-color:#dc2626"><div class="n">${overdueAll.length}</div><div class="l">Overdue</div></div>
          <div class="stat" style="border-color:#f59e0b"><div class="n">${blocked.length}</div><div class="l">Blocked</div></div>
          <div class="stat" style="border-color:#7c3aed"><div class="n">${stale.length}</div><div class="l">No Update 7d+</div></div>
          <div class="stat" style="border-color:#64748b"><div class="n">${noProgress.length}</div><div class="l">0% Progress</div></div>
        </div>
        <h2>Overdue Jobs</h2>
        <table><thead><tr><th>Job / Notes</th><th>Assignee</th><th>Project</th><th>Priority</th><th>Due</th><th>Status</th></tr></thead><tbody>${odRows}</tbody></table>
      `);
    };

    const RiskTable=({title,items,emptyMsg,color="#dc2626"})=><div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden",marginBottom:14}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${DK.bdr3()}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:13,fontWeight:700,color:DK.txt()}}>{title}</div>
        <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:color+"18",color,fontWeight:700}}>{items.length}</span>
      </div>
      {items.length===0?<div style={{padding:20,textAlign:"center",color:DK.txt5(),fontSize:12}}>✅ {emptyMsg}</div>:
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:DK.bg2()}}>{["Job / Notes","Project","Assignee","Priority","Due"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",color:DK.txt4(),fontWeight:700,fontSize:10,textTransform:"uppercase",borderBottom:`1px solid ${DK.bdr2()}`}}>{h}</th>)}</tr></thead>
        <tbody>{items.map(j=>{const od=new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done";const proj=projects.find(p=>p.id===j.project_id);
        return <tr key={j.id} style={{borderBottom:"1px solid #f8fafc"}}>
          <td style={{padding:"9px 12px",maxWidth:220}}>
            <div style={{fontWeight:600,color:DK.txt2()}}>{lang==="lo"&&j.title_lao?j.title_lao:j.title}</div>
            {j.notes&&<RenderNotesJSX raw={j.notes} compact/>}
          </td>
          <td style={{padding:"9px 12px",color:DK.txt4(),fontSize:11}}>{proj?.name||"—"}</td>
          <td style={{padding:"9px 12px"}}><Avtr user={getUser(j.assignee_id)} size={20} showName/></td>
          <td style={{padding:"9px 12px"}}><PriDot priority={j.priority} lang={lang}/></td>
          <td style={{padding:"9px 12px",color:od?"#dc2626":"#94a3b8",fontSize:11,fontWeight:od?700:400,whiteSpace:"nowrap"}}>{od?"⚠ "+cleanDate(j.due_date):cleanDate(j.due_date)}</td>
        </tr>;})}</tbody>
      </table>}
    </div>;

    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700,color:DK.txt()}}>⚠ {lang==="lo"?"ຄວາມສ່ຽງ & ເກີນກໍານົດ":"Risk & Overdue Report"}</div>
        <button onClick={printReport} style={{...BS("#dc2626"),padding:"7px 16px",fontSize:13}}>↓ PDF</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <StatCard label="Overdue" value={overdueAll.length} color="#dc2626" icon="⚠"/>
        <StatCard label="Blocked" value={blocked.length} color="#f59e0b" icon="🚫"/>
        <StatCard label="No Update 7d+" value={stale.length} color="#7c3aed" icon="💤"/>
        <StatCard label="0% Progress" value={noProgress.length} color="#64748b" icon="⬜"/>
      </div>
      <RiskTable title={`⚠ Overdue Jobs (${overdueAll.length})`} items={overdueAll} emptyMsg="No overdue jobs!" color="#dc2626"/>
      <RiskTable title={`🚫 Blocked (${blocked.length})`} items={blocked} emptyMsg="No blocked jobs!" color="#f59e0b"/>
      <RiskTable title={`💤 No Update in 7+ Days (${stale.length})`} items={stale} emptyMsg="All jobs recently updated!" color="#7c3aed"/>
      {noProgress.length>0&&<RiskTable title={`⬜ In Progress but 0% (${noProgress.length})`} items={noProgress} emptyMsg="" color="#64748b"/>}
    </div>;
  };

  // ── TAB: STAFF PERFORMANCE ────────────────────────────────────
  const PerformanceReport=()=>{
    const [fPerfUser,setFPerfUser]=useState("all");
    const baseJobs=period==="all"?jobs:jobs.filter(inPeriod);
    const perfUsers=fPerfUser==="all"?users:users.filter(u=>u.id===fPerfUser);
    const now2=new Date();

    const staffPerf=perfUsers.map(u=>{
      const uj=baseJobs.filter(j=>j.assignee_id===u.id);
      if(!uj.length)return null;
      const done=uj.filter(j=>j.status==="done");
      const overdue=uj.filter(j=>new Date(String(j.due_date).slice(0,10))<now2&&j.status!=="done");
      const onTime=done.filter(j=>{
        if(!j.due_date||!j.updated_at)return false;
        return new Date(String(j.updated_at).slice(0,10))<=new Date(String(j.due_date).slice(0,10));
      });
      const monthlyMine=uj.filter(j=>j.id&&j.id.startsWith("mj_"));
      const monthlyDone=monthlyMine.filter(j=>j.status==="done");
      const active=uj.filter(j=>j.status!=="done");
      const avgPg=active.length?avgNum(active.map(j=>Number(j.progress)||0)):100;
      const compRate=pct(done.length,uj.length);
      const onTimeRate=done.length?pct(onTime.length,done.length):100;
      const overdueRate=pct(overdue.length,uj.length);
      const monthlyRate=monthlyMine.length?pct(monthlyDone.length,monthlyMine.length):null;
      const score=Math.round(compRate*0.35+onTimeRate*0.35+(100-overdueRate)*0.2+avgPg*0.10);
      return {u,total:uj.length,done:done.length,overdue:overdue.length,onTime:onTime.length,monthly:{done:monthlyDone.length,total:monthlyMine.length},compRate,onTimeRate,overdueRate,avgPg,monthlyRate,score};
    }).filter(Boolean).sort((a,b)=>b.score-a.score);

    const scoreColor=s=>s>=80?"#16a34a":s>=60?"#f59e0b":"#dc2626";
    const grade=s=>s>=90?"A":s>=80?"B":s>=70?"C":s>=60?"D":"F";

    const printReport=()=>{
      const summaryRows=staffPerf.map(s=>`<tr>
        <td><strong>${s.u.name}</strong><br/><small>${s.u.department}</small></td>
        <td style="text-align:center;font-size:18px;font-weight:800;color:${scoreColor(s.score)}">${s.score} <small>${grade(s.score)}</small></td>
        <td>${s.total}</td><td>${s.done} (${s.compRate}%)</td><td>${s.onTimeRate}%</td>
        <td style="color:${s.overdue>0?"#dc2626":"#16a34a"}">${s.overdue}</td>
        <td>${s.monthlyRate!==null?s.monthlyRate+"%":"—"}</td><td>${s.avgPg}%</td>
      </tr>`).join("");
      // Per-person job details by project
      const detailSections=staffPerf.map(s=>{
        const byProj={};
        baseJobs.filter(j=>j.assignee_id===s.u.id).forEach(j=>{const k=j.project_id||"__none__";if(!byProj[k])byProj[k]=[];byProj[k].push(j);});
        const projHTML=Object.entries(byProj).map(([pid,pjobs])=>{
          const pname=projects.find(p=>p.id===pid)?.name||"No Project";
          const rows=pjobs.sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9)).map(j=>{
            const od=new Date(String(j.due_date).slice(0,10))<now2&&j.status!=="done";
            return `<tr>
              <td><strong>${lang==="lo"&&j.title_lao?j.title_lao:j.title}</strong>
                ${renderNotesHTML(j.notes)}
              </td>
              <td><span class="badge ${j.status}">${STATUS[j.status]?.en||j.status}</span></td>
              <td class="p ${j.priority}">${j.priority}</td>
              <td style="color:${od?"#dc2626":"#64748b"}">${od?"⚠ ":""}${cleanDate(j.due_date)}</td>
              <td>${j.progress||0}%</td>
            </tr>`;}).join("");
          return `<h3 style="font-size:12px;color:#374151;margin:8px 0 4px;padding-left:8px;border-left:3px solid #e2e8f0">${pname}</h3>
            <table><thead><tr><th>Job / Notes</th><th>Status</th><th>Priority</th><th>Due</th><th>%</th></tr></thead><tbody>${rows}</tbody></table>`;
        }).join("");
        return `<h2 style="margin-top:22px;border-left:4px solid ${scoreColor(s.score)};padding-left:10px">${s.u.name} — ${s.u.department} · Score ${s.score} (${grade(s.score)})</h2>${projHTML}`;
      }).join("");
      exportReport("Staff Performance Report",`
        <h1>📊 Staff Performance Report</h1>
        <div class="meta">Period: ${period.toUpperCase()} · Generated: ${now.toLocaleDateString()} · Manager: ${user.name}</div>
        <p style="color:#64748b;font-size:11px;margin-bottom:14px">Score: Completion (35%) + On-Time (35%) + No-Overdue (20%) + Progress (10%)</p>
        <table><thead><tr><th>Staff</th><th>Score</th><th>Total</th><th>Completed</th><th>On-Time</th><th>Overdue</th><th>Monthly</th><th>Avg%</th></tr></thead><tbody>${summaryRows}</tbody></table>
        ${detailSections}
      `);
    };

    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:DK.txt()}}>📊 {lang==="lo"?"ປະສິດທິພາບພະນັກງານ":"Staff Performance"}</div>
          <div style={{fontSize:12,color:DK.txt4(),marginTop:2}}>Score = Completion (35%) + On-Time (35%) + No-Overdue (20%) + Progress (10%)</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={fPerfUser} onChange={e=>setFPerfUser(e.target.value)}
            style={{...SS(),minWidth:140,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
            <option value="all">{lang==="lo"?"ທຸກຄົນ":"All Staff"}</option>
            {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <button onClick={printReport} style={{...BS("#dc2626"),padding:"7px 16px",fontSize:13}}>↓ PDF</button>
        </div>
      </div>
      {staffPerf.length===0&&<div style={{background:DK.bg(),borderRadius:12,padding:40,textAlign:"center",color:DK.txt5()}}>No data for this period.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14,marginBottom:18}}>
        {staffPerf.map((s,idx)=>(
          <div key={s.u.id} style={{background:DK.bg(),borderRadius:12,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderLeft:`4px solid ${scoreColor(s.score)}`}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <div style={{position:"relative"}}>
                <Avtr user={s.u} size={42}/>
                {idx===0&&<div style={{position:"absolute",top:-6,right:-6,fontSize:14}}>🥇</div>}
                {idx===1&&<div style={{position:"absolute",top:-6,right:-6,fontSize:14}}>🥈</div>}
                {idx===2&&<div style={{position:"absolute",top:-6,right:-6,fontSize:14}}>🥉</div>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:DK.txt(),fontSize:14}}>{s.u.name}</div>
                <div style={{fontSize:11,color:DK.txt4()}}>{s.u.department}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:800,color:scoreColor(s.score),lineHeight:1}}>{s.score}</div>
                <div style={{fontSize:16,fontWeight:700,color:scoreColor(s.score)}}>{grade(s.score)}</div>
              </div>
            </div>
            {[
              {lbl:lang==="lo"?"ສໍາເລັດ":"Completion",val:`${s.done}/${s.total}`,p:s.compRate,c:"#3b82f6"},
              {lbl:lang==="lo"?"ຕົງເວລາ":"On-Time",val:`${s.onTimeRate}%`,p:s.onTimeRate,c:"#16a34a"},
              {lbl:lang==="lo"?"ຄວາມຄືບໜ້າ":"Avg Progress",val:`${s.avgPg}%`,p:s.avgPg,c:"#7c3aed"},
              ...(s.monthlyRate!==null?[{lbl:lang==="lo"?"ວຽກປະຈໍາເດືອນ":"Monthly Routine",val:`${s.monthly.done}/${s.monthly.total}`,p:s.monthlyRate,c:"#059669"}]:[]),
            ].map(m=>(
              <div key={m.lbl} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontSize:11,color:DK.txt4()}}>{m.lbl}</span>
                  <span style={{fontSize:11,fontWeight:700,color:m.c}}>{m.val}</span>
                </div>
                <div style={{height:4,background:DK.bg3(),borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${m.p}%`,background:m.c,borderRadius:99,transition:"width 0.5s"}}/>
                </div>
              </div>
            ))}
            {s.overdue>0&&<div style={{marginTop:8,fontSize:11,color:"#dc2626",fontWeight:600,background:"#fef2f2",padding:"4px 8px",borderRadius:6}}>⚠ {s.overdue} {lang==="lo"?"ວຽກເກີນກໍານົດ":"overdue"}</div>}
          </div>
        ))}
      </div>
      <div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${DK.bdr3()}`,fontSize:13,fontWeight:700,color:DK.txt()}}>📋 {lang==="lo"?"ສຸ່ມທຽບ":"Comparison"}</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:DK.bg2()}}>
            {["Staff","Score","Jobs","Done%","On-Time%","Overdue","Monthly%","Avg%"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",color:DK.txt4(),fontWeight:700,fontSize:10,textTransform:"uppercase",borderBottom:`1px solid ${DK.bdr2()}`}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {staffPerf.map(s=><tr key={s.u.id} style={{borderBottom:"1px solid #f8fafc"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>
              <td style={{padding:"9px 12px"}}><Avtr user={s.u} size={22} showName/></td>
              <td style={{padding:"9px 12px"}}><span style={{fontWeight:800,color:scoreColor(s.score),fontSize:14}}>{s.score}</span> <span style={{fontWeight:700,color:scoreColor(s.score)}}>{grade(s.score)}</span></td>
              <td style={{padding:"9px 12px",fontWeight:600}}>{s.total}</td>
              <td style={{padding:"9px 12px"}}><span style={{color:s.compRate>=70?"#16a34a":s.compRate>=50?"#f59e0b":"#dc2626",fontWeight:700}}>{s.compRate}%</span></td>
              <td style={{padding:"9px 12px"}}><span style={{color:s.onTimeRate>=80?"#16a34a":s.onTimeRate>=60?"#f59e0b":"#dc2626",fontWeight:700}}>{s.onTimeRate}%</span></td>
              <td style={{padding:"9px 12px",color:s.overdue>0?"#dc2626":"#16a34a",fontWeight:700}}>{s.overdue||"✓"}</td>
              <td style={{padding:"9px 12px"}}>{s.monthlyRate!==null?<span style={{color:s.monthlyRate>=80?"#16a34a":s.monthlyRate>=50?"#f59e0b":"#dc2626",fontWeight:700}}>{s.monthlyRate}%</span>:<span style={{color:DK.txt5()}}>—</span>}</td>
              <td style={{padding:"9px 12px",color:DK.txt4()}}>{s.avgPg}%</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>;
  };

  // ── TAB: PROJECT PROGRESSION ───────────────────────────────────
  const ProjectReport=()=>{
    const [fProjUser,setFProjUser]=useState("all");
    const sc={active:"#2563eb",planning:"#7c3aed",completed:"#16a34a",paused:"#f59e0b"};

    const sortedProjects=[...projects].sort((a,b)=>{
      const order={active:0,planning:1,paused:2,completed:3};
      const oa=order[a.status]??4,ob=order[b.status]??4;
      if(oa!==ob)return oa-ob;
      const pjA=jobs.filter(j=>j.project_id===a.id),pjB=jobs.filter(j=>j.project_id===b.id);
      const pA=pjA.length?Math.round(pjA.filter(j=>j.status==="done").length/pjA.length*100):0;
      const pB=pjB.length?Math.round(pjB.filter(j=>j.status==="done").length/pjB.length*100):0;
      return pB-pA;
    });

    const filterJob=j=>fProjUser==="all"||j.assignee_id===fProjUser;

    const printReport=()=>{
      const projHTML=sortedProjects.map(p=>{
        const pj=jobs.filter(j=>j.project_id===p.id&&filterJob(j));
        if(!pj.length)return "";
        const done=pj.filter(j=>j.status==="done").length;
        const pct2=pj.length?Math.round(done/pj.length*100):0;
        const sorted=[...pj].sort((a,b)=>{
          if(a.status==="done"&&b.status!=="done")return 1;
          if(a.status!=="done"&&b.status==="done")return -1;
          return (PO[a.priority]||9)-(PO[b.priority]||9);
        });
        const jobRows=sorted.map(j=>{
          const od=new Date(String(j.due_date).slice(0,10))<new Date()&&j.status!=="done";
          return `<tr>
            <td style="${j.status==="done"?"text-decoration:line-through;color:#94a3b8":""}" >
              <strong>${lang==="lo"&&j.title_lao?j.title_lao:j.title}</strong>
              ${renderNotesHTML(j.notes)}
            </td>
            <td>${getUser(j.assignee_id)?.name||"—"}</td>
            <td><span class="badge ${j.status}">${STATUS[j.status]?.en||j.status}</span></td>
            <td class="p ${j.priority}">${j.priority}</td>
            <td style="color:${od?"#dc2626":"#64748b"}">${od?"⚠ ":""}${cleanDate(j.due_date)}</td>
            <td>${j.progress||0}%</td>
          </tr>`;}).join("");
        return `
          <h2 style="border-left:5px solid ${sc[p.status]||"#94a3b8"};padding-left:12px;margin-top:24px;background:#f8fafc;padding:10px 12px;border-radius:4px">
            ${lang==="lo"&&p.name_lao?p.name_lao:p.name}
            <span style="font-size:11px;color:#64748b;font-weight:400;margin-left:10px">${p.status} · ${done}/${pj.length} done · ${pct2}% complete · Due ${cleanDate(p.due_date)}</span>
          </h2>
          <table><thead><tr><th>Job / Notes</th><th>Assignee</th><th>Status</th><th>Priority</th><th>Due</th><th>%</th></tr></thead>
          <tbody>${jobRows}</tbody></table>`;
      }).join("");
      exportReport("Project Progression Report",`
        <h1>📂 Project Progression Report</h1>
        <div class="meta">Generated: ${now.toLocaleDateString()} · Manager: ${user.name}${fProjUser!=="all"?" · Staff: "+users.find(u=>u.id===fProjUser)?.name:""}</div>
        ${projHTML}
      `);
    };

    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:15,fontWeight:700,color:DK.txt()}}>📂 {lang==="lo"?"ຄວາມຄືບໜ້າໂຄງການ":"Project Progression Report"}
          <span style={{fontSize:12,color:DK.txt4(),fontWeight:400,marginLeft:8}}>Active → Planning → Paused → Completed · Notes always shown</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {user.role==="leader"&&<select value={fProjUser} onChange={e=>setFProjUser(e.target.value)}
            style={{...SS(),minWidth:140,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
            <option value="all">{lang==="lo"?"ທຸກຄົນ":"All Staff"}</option>
            {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>}
          <button onClick={printReport} style={{...BS("#dc2626"),padding:"7px 16px",fontSize:13}}>↓ PDF</button>
        </div>
      </div>

      {sortedProjects.map(p=>{
        const pj=jobs.filter(j=>j.project_id===p.id&&filterJob(j));
        const done=pj.filter(j=>j.status==="done").length;
        const pct2=pj.length?Math.round(done/pj.length*100):0;
        const projColor=sc[p.status]||"#94a3b8";
        const sorted=[...pj].sort((a,b)=>{
          if(a.status==="done"&&b.status!=="done")return 1;
          if(a.status!=="done"&&b.status==="done")return -1;
          return (PO[a.priority]||9)-(PO[b.priority]||9);
        });

        return <div key={p.id} style={{background:DK.bg(),borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:16,overflow:"hidden"}}>
          {/* Project header */}
          <div style={{padding:"14px 18px",borderLeft:`5px solid ${projColor}`,background:pct2===100?"#f0fdf4":"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontWeight:800,color:DK.txt(),fontSize:15}}>{lang==="lo"&&p.name_lao?p.name_lao:p.name}</div>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:projColor+"18",color:projColor,fontWeight:700,textTransform:"capitalize"}}>{p.status}</span>
                  {pct2===100&&<span style={{fontSize:12}}>✅</span>}
                </div>
                {p.description&&<div style={{fontSize:12,color:DK.txt4(),marginTop:2}}>{p.description}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:800,color:projColor}}>{pct2}%</div>
                  <div style={{fontSize:11,color:DK.txt5()}}>{done}/{pj.length} {lang==="lo"?"ວຽກ":"jobs"}</div>
                </div>
                <Avtr user={users.find(u=>u.id===p.leader_id)} size={32} showName/>
              </div>
            </div>
            <div style={{marginTop:10,height:8,background:DK.bg3(),borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct2}%`,background:pct2===100?"#16a34a":projColor,borderRadius:99,transition:"width 0.6s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:DK.txt5(),marginTop:3}}>
              <span>{lang==="lo"?"ເລີ່ມ":"Start"} {cleanDate(p.start_date)}</span>
              <span>{lang==="lo"?"ກໍານົດ":"Due"} {cleanDate(p.due_date)}</span>
            </div>
          </div>

          {/* Jobs — notes always shown */}
          {sorted.map(j=>{
            const od=new Date(String(j.due_date).slice(0,10))<new Date()&&j.status!=="done";
            const pg=Number(j.progress)||0;
            const isDone=j.status==="done";
            const jColor=isDone?"#16a34a":od?"#dc2626":STATUS[j.status]?.c||"#e2e8f0";
            return <div key={j.id} style={{padding:"10px 18px 10px 22px",borderBottom:"1px solid #f8fafc",borderLeft:`3px solid ${jColor}`,background:isDone?"#f9fafb":"#fff",opacity:isDone?0.68:1}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
                    <span style={{fontWeight:isDone?400:600,color:isDone?"#94a3b8":"#1e293b",fontSize:13,textDecoration:isDone?"line-through":"none"}}>{lang==="lo"&&j.title_lao?j.title_lao:j.title}</span>
                    <Badge status={j.status} lang={lang}/>
                    <PriDot priority={j.priority} lang={lang}/>
                    {od&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700}}>⚠ Overdue</span>}
                  </div>
                  {/* Progress + meta row */}
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <div style={{width:80,height:4,background:DK.bg3(),borderRadius:99,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pg}%`,background:isDone?"#16a34a":od?"#dc2626":"#3b82f6",borderRadius:99}}/>
                      </div>
                      <span style={{fontSize:11,color:DK.txt5(),fontWeight:600}}>{pg}%</span>
                    </div>
                    <Avtr user={getUser(j.assignee_id)} size={16} showName/>
                    <span style={{fontSize:11,color:od?"#dc2626":"#94a3b8",whiteSpace:"nowrap"}}>{od?"⚠ ":""}{cleanDate(j.due_date)}</span>
                  </div>
                  {/* Notes — always shown when they exist */}
                  {j.notes&&<RenderNotesJSX raw={j.notes} compact/>}
                </div>
              </div>
            </div>;
          })}
          {pj.length===0&&<div style={{padding:"16px 18px",color:DK.txt5(),fontSize:12}}>{lang==="lo"?"ຍັງບໍ່ມີວຽກ":"No jobs yet."}</div>}
        </div>;
      })}
    </div>;
  };

  const TABS=[
    {id:"personal",en:"📋 Personal",  lo:"📋 ສ່ວນຕົວ",       show:true},
    {id:"team",    en:"👥 Team",      lo:"👥 ທີມ",             show:user.role==="leader"},
    {id:"project", en:"📂 Projects",  lo:"📂 ໂຄງການ",          show:true},
    {id:"perf",    en:"📊 Performance",lo:"📊 ປະສິດທິພາບ",     show:user.role==="leader"},
    {id:"risk",    en:"⚠ Risk",      lo:"⚠ ຄວາມສ່ຽງ",        show:user.role==="leader"},
  ].filter(t=>t.show);

  const PERIODS=[{v:"week",en:"This Week",lo:"ອາທິດນີ້"},{v:"month",en:"This Month",lo:"ເດືອນນີ້"},{v:"quarter",en:"Quarter",lo:"ໄຕມາດ"},{v:"year",en:"This Year",lo:"ປີນີ້"},{v:"all",en:"All Time",lo:"ທັງໝົດ"}];

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* Tab + Period bar */}
    <div style={{background:DK.bg(),borderRadius:12,padding:"12px 16px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",gap:4}}>
        {TABS.map(tb=><button key={tb.id} onClick={()=>setTab(tb.id)}
          style={{padding:"7px 16px",borderRadius:8,border:"none",background:tab===tb.id?"#0f172a":"transparent",color:tab===tb.id?"#fff":"#64748b",fontWeight:tab===tb.id?700:500,fontSize:13,cursor:"pointer",transition:"all 0.15s"}}>
          {tb[lang]||tb.en}
        </button>)}
      </div>
      <div style={{display:"flex",gap:4}}>
        {PERIODS.map(p=><button key={p.v} onClick={()=>setPeriod(p.v)}
          style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${period===p.v?"#2563eb":"#e2e8f0"}`,background:period===p.v?"#eff6ff":"#fff",color:period===p.v?"#2563eb":"#64748b",fontWeight:period===p.v?700:400,fontSize:12,cursor:"pointer"}}>
          {p[lang]||p.en}
        </button>)}
      </div>
    </div>

    {tab==="personal"&&<PersonalReport/>}
    {tab==="team"&&<TeamReport/>}
    {tab==="project"&&<ProjectReport/>}
    {tab==="perf"&&<PerformanceReport/>}
    {tab==="risk"&&<RiskReport/>}
  </div>;
}

// ── TEAM BOARD ─────────────────────────────────────────────────
function BoardPage({board,user,users,getUser,onAddNote,onEditNote,onDeleteNote,lang}){
  const t=T[lang];
  // Wins removed; 4 columns only
  const COLS=["📢 Announcements","💡 Ideas","✅ Action Items","❓ Questions"];
  const COL_COLORS={"📢 Announcements":"#2563eb","💡 Ideas":"#7c3aed","✅ Action Items":"#059669","❓ Questions":"#f59e0b"};

  const [modal,setModal]=useState(null);
  const [editNote,setEditNote]=useState(null);
  // Track which note IDs this user has "seen" — stored in localStorage per user
  const seenKey="board_seen_"+user.id;
  const getSeenIds=()=>{try{return JSON.parse(localStorage.getItem(seenKey)||"[]");}catch{return [];}};
  const [seenIds,setSeenIds]=useState(()=>getSeenIds());
  const markSeen=(ids)=>{const next=[...new Set([...seenIds,...ids])];setSeenIds(next);try{localStorage.setItem(seenKey,JSON.stringify(next));}catch{}};

  // New notes = posted by others, not yet seen
  const newNotes=board.filter(n=>String(n.author_id)!==String(user.id)&&!seenIds.includes(String(n.id)));

  const notesByCol=useMemo(()=>{
    const m={};
    COLS.forEach(c=>{m[c]=board.filter(n=>n.column===c).sort((a,b)=>{
      const ap=a.pinned===true||a.pinned==="true"?1:0,bp=b.pinned===true||b.pinned==="true"?1:0;
      if(bp!==ap)return bp-ap;
      return new Date(b.created_at||0)-new Date(a.created_at||0);
    });});
    return m;
  },[board]);

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* Header */}
    <div style={{background:DK.bg(),borderRadius:12,padding:"13px 18px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div>
        <div style={{fontSize:16,fontWeight:700,color:DK.txt()}}>📌 {lang==="lo"?"ກະດານທີມ":"Team Board"}</div>
        <div style={{color:DK.txt4(),fontSize:13,marginTop:1}}>{lang==="lo"?"ແບ່ງປັນຂ່າວ, ແນວຄວາມຄິດ ແລະ ລາຍການດໍາເນີນການ":"Share announcements, ideas and action items with your team"}</div>
      </div>
      <button onClick={()=>setModal({col:COLS[0]})} style={BS("#2563eb")}>+ {lang==="lo"?"ໂພດ":"Post Note"}</button>
    </div>

    {/* New notes notification banner */}
    {newNotes.length>0&&<div style={{background:"linear-gradient(135deg,#1e3a5f,#312e81)",borderRadius:12,padding:"12px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>🔔</span>
        <div>
          <div style={{color:"#fff",fontSize:13,fontWeight:700}}>
            {newNotes.length} {lang==="lo"?"ໝາຍເຫດໃໝ່ຈາກທີມ":"new note"+(newNotes.length>1?"s":"")} {lang==="lo"?"":"from your team"}
          </div>
          <div style={{color:"#93c5fd",fontSize:11,marginTop:1}}>
            {newNotes.slice(0,2).map(n=>`"${(n.content||"").slice(0,40)}${n.content?.length>40?"…":""}" — ${getUser(n.author_id)?.name?.split(" ")[0]||"?"}`).join(" · ")}
          </div>
        </div>
      </div>
      <button onClick={()=>markSeen(newNotes.map(n=>String(n.id)))}
        style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.12)",color:"#e2e8f0",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>
        ✓ {lang==="lo"?"ຮັບຊາບແລ້ວ":"Mark all seen"}
      </button>
    </div>}

    {/* 4-column board */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,alignItems:"start"}}>
      {COLS.map(col=>{
        const cc=COL_COLORS[col];
        const colNotes=notesByCol[col]||[];
        const colNew=colNotes.filter(n=>String(n.author_id)!==String(user.id)&&!seenIds.includes(String(n.id)));
        return <div key={col} style={{background:DK.bg2(),borderRadius:12,padding:14,minHeight:180}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{fontSize:13,fontWeight:700,color:DK.txt()}}>{col}</div>
              {colNew.length>0&&<span style={{background:"#dc2626",color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 5px",minWidth:16,textAlign:"center"}}>{colNew.length}</span>}
            </div>
            <button onClick={()=>setModal({col})}
              style={{width:22,height:22,borderRadius:"50%",border:"none",background:cc+"22",color:cc,fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,cursor:"pointer"}}>+</button>
          </div>
          {colNotes.length===0&&<div style={{color:"#cbd5e1",fontSize:12,textAlign:"center",paddingTop:10}}>—</div>}
          {colNotes.map(note=>{
            const au=getUser(note.author_id);
            const isPinned=note.pinned==="true"||note.pinned===true;
            const isNew=String(note.author_id)!==String(user.id)&&!seenIds.includes(String(note.id));
            return <div key={note.id}
              style={{background:DK.bg(),borderRadius:10,padding:11,marginBottom:8,boxShadow:isNew?"0 0 0 2px "+cc+", 0 2px 6px rgba(0,0,0,0.08)":"0 1px 3px rgba(0,0,0,0.06)",borderLeft:`3px solid ${cc}`,position:"relative",transition:"box-shadow 0.2s"}}
              onClick={()=>isNew&&markSeen([String(note.id)])}>
              {isPinned&&<div style={{position:"absolute",top:6,right:8,fontSize:11}}>📌</div>}
              {isNew&&<div style={{position:"absolute",top:7,right:isPinned?24:8,width:7,height:7,borderRadius:"50%",background:"#dc2626"}}/>}
              <div style={{fontSize:13,color:DK.txt2(),lineHeight:1.55,fontWeight:note.important==="true"||note.important===true?"700":"400",marginBottom:7,paddingRight:isNew||isPinned?18:0}}>{note.content}</div>
              {note.tag&&<span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:cc+"18",color:cc,fontWeight:700,display:"inline-block",marginBottom:6}}>#{note.tag}</span>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}><Avtr user={au} size={15}/><span style={{fontSize:10,color:DK.txt5()}}>{au?.name?.split(" ")[0]||"?"} · {cleanDate(note.created_at)}</span></div>
                {(user.role==="leader"||String(note.author_id)===String(user.id))&&<div style={{display:"flex",gap:3}}>
                  <button onClick={e=>{e.stopPropagation();setEditNote(note);}} style={{fontSize:11,color:DK.txt4(),background:"none",border:"none",padding:"2px 4px",cursor:"pointer"}}>✏</button>
                  <button onClick={e=>{e.stopPropagation();onDeleteNote(note.id);}} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",padding:"2px 4px",cursor:"pointer"}}>✕</button>
                </div>}
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>

    {(modal||editNote)&&<NoteModal
      initial={editNote}
      defaultCol={modal?.col||editNote?.column||COLS[0]}
      cols={COLS} colColors={COL_COLORS}
      onClose={()=>{setModal(null);setEditNote(null);}}
      onSave={data=>{if(editNote)onEditNote(data);else onAddNote(data);setModal(null);setEditNote(null);}}
      user={user} lang={lang}
    />}
  </div>;
}

function NoteModal({initial,defaultCol,cols,colColors,onClose,onSave,user,lang}){
  const [f,setF]=useState(initial||{content:"",column:defaultCol,tag:"",pinned:false,important:false,author_id:user.id});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  return <Modal title={initial?(lang==="lo"?"ແກ້ໄຂ":"Edit Note"):(lang==="lo"?"ໂພດ":"Post Note")} onClose={onClose} onSave={()=>onSave(f)}>
    <Lbl label={lang==="lo"?"ໂຖ":"Column"}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {cols.map(c=>{const cc=colColors[c]||"#2563eb";return <button key={c} type="button" onClick={()=>set("column",c)}
          style={{padding:"5px 10px",borderRadius:8,border:`2px solid ${f.column===c?cc:"#e2e8f0"}`,background:f.column===c?cc+"15":"#fff",color:f.column===c?cc:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>{c}</button>;})}
      </div>
    </Lbl>
    <Lbl label={lang==="lo"?"ເນື້ອຫາ":"Content"}>
      <textarea value={f.content} onChange={e=>set("content",e.target.value)} style={{...IS(),height:100,resize:"vertical"}} placeholder={lang==="lo"?"ຂຽນທີ່ນີ້...":"Write your note here..."}/>
    </Lbl>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Lbl label="Tag"><input value={f.tag||""} onChange={e=>set("tag",e.target.value)} style={IS()} placeholder="e.g. urgent"/></Lbl>
      <Lbl label={lang==="lo"?"ຕົວເລືອກ":"Options"}>
        <div style={{display:"flex",gap:12,marginTop:4}}>
          <label style={{display:"flex",alignItems:"center",gap:5,fontSize:13,cursor:"pointer"}}><input type="checkbox" checked={f.pinned===true||f.pinned==="true"} onChange={e=>set("pinned",e.target.checked)} style={{cursor:"pointer"}}/> 📌 Pin</label>
          <label style={{display:"flex",alignItems:"center",gap:5,fontSize:13,cursor:"pointer"}}><input type="checkbox" checked={f.important===true||f.important==="true"} onChange={e=>set("important",e.target.checked)} style={{cursor:"pointer"}}/> ⭐ Bold</label>
        </div>
      </Lbl>
    </div>
  </Modal>;
}

function JobRequestModal({onClose,onSave,projects,users,user,lang,saving}){
  const t=T[lang];
  const [f,setF]=useState({title:"",title_lao:"",description:"",project_id:projects[0]?.id||"",assignee_id:user.id,priority:"medium",category:"",start_date:"",due_date:"",estimated_hours:8,notes:""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  return <Modal title={"📥 "+t.requestJob} onClose={onClose} onSave={()=>onSave(f)} saveLabel={t.requestJob} saveColor="#f59e0b" saving={saving} wide>
    <div style={{padding:"10px 14px",background:"#fefce8",borderRadius:8,marginBottom:14,fontSize:13,color:"#92400e"}}>ℹ️ {lang==="lo"?"ຄໍາຂໍນີ້ຈະສົ່ງໃຫ້ຫົວໜ້າອະນຸມັດ":"This request will be sent to your leader for approval."}</div>
    <JobForm form={f} set={set} projects={projects} users={users} user={user} lang={lang} isRequest={true}/>
  </Modal>;
}

// ── PRINT JOB CARD (standalone PDF for a single job) ──────────

  if(!win)return;
  const assignee=getUser(job.assignee_id);
  const proj=projects.find(p=>p.id===job.project_id);
  const od=new Date(String(job.due_date).slice(0,10))<new Date()&&job.status!=="done";

  const priC={"urgent":"#dc2626","high":"#f97316","medium":"#f59e0b","low":"#94a3b8"};

    .meta-value{font-size:13px;font-weight:600;color:#1e293b}

    .progress-bar{height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-bottom:4px}

    .logo{font-size:10px;color:#94a3b8;text-align:right}
    @media print{body{padding:14px 18px}@page{size:A4;margin:15mm}}
  </style></head><body>
  <div class="header">
    <div style="flex:1">
      <div class="title">${lang==="lo"&&job.title_lao?job.title_lao:job.title}</div>
      ${job.title_lao&&lang!=="lo"?`<div class="title-lao">${job.title_lao}</div>`:""}
      <div class="badges">
        <span class="badge" style="background:${statusC[job.status]||"#94a3b8"}22;color:${statusC[job.status]||"#94a3b8"}">${STATUS[job.status]?.en||job.status}</span>
        <span class="badge" style="color:${priC[job.priority]||"#94a3b8"};background:${priC[job.priority]||"#94a3b8"}18">● ${job.priority?.toUpperCase()}</span>

          stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pg/100)}"

    <span>FS Taskflow &nbsp;|&nbsp; Job ID: ${job.id}</span>
    <span>Last updated: ${cleanDate(job.updated_at)} &nbsp;|&nbsp; Printed: ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})}</span>
  </div>
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),900);
}

// ── DUE TODAY BANNER ───────────────────────────────────────────
function DueTodayBanner({jobs,user,lang,onOpenJob}){
  const [dismissed,setDismissed]=useState(false);
  const todayStr=new Date().toISOString().slice(0,10);
  const myJobs=jobs.filter(j=>j.assignee_id===user.id||user.role==="leader");
  const dueToday=myJobs.filter(j=>String(j.due_date).slice(0,10)===todayStr&&j.status!=="done");
  const overdue=myJobs.filter(j=>String(j.due_date).slice(0,10)<todayStr&&j.status!=="done");
  if(dismissed||(!dueToday.length&&!overdue.length))return null;
  const PO2={urgent:0,high:1,medium:2,low:3};
  const sorted=[...dueToday,...overdue].sort((a,b)=>(PO2[a.priority]||9)-(PO2[b.priority]||9)).slice(0,6);
  return (
    <div style={{position:"fixed",top:16,right:16,zIndex:8888,width:340,background:DK.bg(),borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,0.16)",border:`1px solid ${DK.bdr2()}`,animation:"fadeUp 0.3s ease",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:overdue.length?"linear-gradient(135deg,#7f1d1d,#dc2626)":"linear-gradient(135deg,#1e3a5f,#2563eb)",padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:13}}>
            {overdue.length?"⚠ "+overdue.length+" Overdue":"🔔 Due Today"}
            {dueToday.length>0&&overdue.length>0&&` · ${dueToday.length} today`}
          </div>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:10,marginTop:1}}>
            {lang==="lo"?"ຕ້ອງການຄວາມສົນໃຈ":"Needs your attention"}
          </div>
        </div>
        <button onClick={()=>setDismissed(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>✕</button>
      </div>
      {/* Job list */}
      <div style={{maxHeight:280,overflowY:"auto"}}>
        {sorted.map(j=>{
          const isOd=String(j.due_date).slice(0,10)<todayStr;
          const priC={urgent:"#dc2626",high:"#f97316",medium:"#f59e0b",low:"#94a3b8"};
          return <div key={j.id} onClick={()=>onOpenJob(j)} style={{padding:"10px 14px",borderBottom:`1px solid ${DK.bdr3()}`,cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"background 0.1s"}}
            onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
            onMouseLeave={e=>e.currentTarget.style.background=""}>
            <div style={{width:4,height:36,borderRadius:2,background:isOd?"#dc2626":priC[j.priority]||"#94a3b8",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,color:DK.txt2(),fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lang==="lo"&&j.title_lao?j.title_lao:j.title}</div>
              <div style={{fontSize:10,color:isOd?"#dc2626":"#94a3b8",marginTop:1}}>
                {isOd?"⚠ Overdue · ":"Due today · "}{cleanDate(j.due_date)} · {Number(j.progress)||0}%
              </div>
            </div>
            <span style={{fontSize:10,color:DK.txt5(),flexShrink:0}}>→</span>
          </div>;
        })}
      </div>
      {sorted.length===0&&<div style={{padding:16,textAlign:"center",color:DK.txt5(),fontSize:12}}>✅ All clear!</div>}
    </div>
  );
}

// ── MY WORK PAGE ───────────────────────────────────────────────
function MyWorkPage({jobs,projects,user,getUser,onEdit,onInlineUpdate,lang,saving}){
  const [expandedId,setExpandedId]=useState(null);
  const todayStr=new Date().toISOString().slice(0,10);
  const now=new Date();
  const mine=jobs.filter(j=>j.assignee_id===user.id);

  const groups=[
    {id:"overdue",label:lang==="lo"?"⚠ ເກີນກໍານົດ":"⚠ Overdue",color:"#dc2626",bg:"#fef2f2",jobs:mine.filter(j=>String(j.due_date).slice(0,10)<todayStr&&j.status!=="done").sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))},
    {id:"today",label:lang==="lo"?"🔴 ຄົບກໍານົດວັນນີ້":"🔴 Due Today",color:"#f59e0b",bg:"#fffbeb",jobs:mine.filter(j=>String(j.due_date).slice(0,10)===todayStr&&j.status!=="done")},
    {id:"week",label:lang==="lo"?"📅 ອາທິດນີ້":"📅 This Week",color:"#2563eb",bg:"#eff6ff",jobs:mine.filter(j=>{const d=new Date(String(j.due_date).slice(0,10));const diff=Math.round((d-now)/(1000*60*60*24));return diff>0&&diff<=7&&j.status!=="done";}).sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))},
    {id:"later",label:lang==="lo"?"🗓 ຕໍ່ໄປ":"🗓 Coming Up",color:"#7c3aed",bg:"#f5f3ff",jobs:mine.filter(j=>{const d=new Date(String(j.due_date).slice(0,10));const diff=Math.round((d-now)/(1000*60*60*24));return diff>7&&j.status!=="done";}).sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))},
    {id:"done",label:lang==="lo"?"✅ ສໍາເລັດແລ້ວ":"✅ Done",color:"#16a34a",bg:"#f0fdf4",jobs:mine.filter(j=>j.status==="done").sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at)).slice(0,10)},
  ];

  const total=mine.length,done=mine.filter(j=>j.status==="done").length;

  const JobRow=({j,groupColor})=>{
    const od=String(j.due_date).slice(0,10)<todayStr&&j.status!=="done";
    const pg=Number(j.progress)||0;
    const isEx=expandedId===j.id;
    const proj=projects.find(p=>p.id===j.project_id);
    return <div style={{borderBottom:`1px solid ${DK.bdr3()}`}}>
      <div onClick={()=>setExpandedId(isEx?null:j.id)}
        style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",cursor:"pointer",background:isEx?"#f0f9ff":"",transition:"background 0.1s"}}
        onMouseEnter={e=>{if(!isEx)e.currentTarget.style.background="#f8fafc";}}
        onMouseLeave={e=>{if(!isEx)e.currentTarget.style.background="";}}>
        <span style={{fontSize:9,color:DK.txt5(),transform:isEx?"rotate(90deg)":"",transition:"transform 0.2s",flexShrink:0}}>▶</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,color:j.status==="done"?"#94a3b8":"#1e293b",fontSize:13,textDecoration:j.status==="done"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lang==="lo"&&j.title_lao?j.title_lao:j.title}</div>
          <div style={{fontSize:10,color:DK.txt5(),marginTop:1}}>{proj?.name||""}{j.category?" · "+j.category:""}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:50,height:4,background:DK.bg3(),borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pg}%`,background:pg===100?"#16a34a":groupColor,borderRadius:99}}/></div>
            <span style={{fontSize:10,color:DK.txt4(),fontWeight:600}}>{pg}%</span>
          </div>
          <span style={{fontSize:11,color:od?"#dc2626":"#94a3b8",fontWeight:od?700:400,whiteSpace:"nowrap"}}>{od?"⚠ ":""}{cleanDate(j.due_date)}</span>
          <Badge status={j.status} lang={lang}/>
          {user.role==="leader"&&<button onClick={e=>{e.stopPropagation();onEdit(j);}} style={{...BS("#2563eb"),padding:"3px 8px",fontSize:10}}>Edit</button>}
          <button onClick={e=>{e.stopPropagation();printJobCard(j,projects,getUser,lang);}} title="Print Job Card" style={{width:24,height:24,borderRadius:6,border:`1px solid ${DK.bdr()}`,background:DK.bg(),cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>🖨</button>
        </div>
      </div>
      {isEx&&<JobDetailPanel job={j} user={user} getUser={getUser} projects={projects} lang={lang} saving={saving}
        onSave={updated=>{onInlineUpdate(updated);setExpandedId(null);}}
        onClose={()=>setExpandedId(null)}/>}
    </div>;
  };

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* My stats row */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
      {[
        {l:lang==="lo"?"ວຽກທັງໝົດ":"Total",v:total,c:"#2563eb"},
        {l:lang==="lo"?"ເກີນກໍານົດ":"Overdue",v:groups[0].jobs.length,c:"#dc2626"},
        {l:lang==="lo"?"ວັນນີ້":"Today",v:groups[1].jobs.length,c:"#f59e0b"},
        {l:lang==="lo"?"ອາທິດນີ້":"This Week",v:groups[2].jobs.length,c:"#7c3aed"},
        {l:lang==="lo"?"ສໍາເລັດ":"Done",v:done,c:"#16a34a"},
      ].map(s=><div key={s.l} style={{background:DK.bg(),borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderTop:`3px solid ${s.c}`,textAlign:"center"}}>
        <div style={{fontSize:24,fontWeight:800,color:s.c}}>{s.v}</div>
        <div style={{fontSize:11,color:DK.txt5(),fontWeight:600,textTransform:"uppercase",marginTop:2}}>{s.l}</div>
      </div>)}
    </div>

    {/* Progress summary */}
    <div style={{background:DK.bg(),borderRadius:12,padding:"12px 18px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:14}}>
      <Avtr user={user} size={40}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,color:DK.txt(),fontSize:14}}>{user.name} — {lang==="lo"?"ວຽກຂອງຂ້ອຍ":"My Work"}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
          <div style={{flex:1,height:8,background:DK.bg3(),borderRadius:99,overflow:"hidden",maxWidth:240}}>
            <div style={{height:"100%",width:`${total?Math.round(done/total*100):0}%`,background:"#16a34a",borderRadius:99,transition:"width 0.6s"}}/>
          </div>
          <span style={{fontSize:12,color:DK.txt4()}}>{total?Math.round(done/total*100):0}% {lang==="lo"?"ສໍາເລັດ":"complete"} ({done}/{total})</span>
        </div>
      </div>
    </div>

    {/* Grouped job lists */}
    {groups.map(g=>g.jobs.length>0&&<div key={g.id} style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:12,overflow:"hidden"}}>
      <div style={{padding:"10px 16px",background:g.bg,borderBottom:`1px solid ${DK.bdr3()}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:700,color:g.color,fontSize:13}}>{g.label}</div>
        <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:g.color+"18",color:g.color,fontWeight:700}}>{g.jobs.length}</span>
      </div>
      {g.jobs.map(j=><JobRow key={j.id} j={j} groupColor={g.color}/>)}
    </div>)}

    {mine.length===0&&<div style={{background:DK.bg(),borderRadius:12,padding:40,textAlign:"center",color:DK.txt5(),boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      ✅ {lang==="lo"?"ບໍ່ມີວຽກທີ່ໄດ້ຮັບມອບໝາຍ":"No jobs assigned to you yet"}
    </div>}
  </div>;
}

// ── ACTIVITY LOG PAGE ──────────────────────────────────────────
function ActivityLogPage({jobs,users,getUser,lang}){
  const [fUser,setFUser]=useState("all");
  const [fAction,setFAction]=useState("all");
  const [q,setQ]=useState("");
  // Load logs from Google Sheets via reload — they're in the jobs+users context
  // Since logs are not in main state, we fetch them separately
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    apiGet({action:"getAll"}).then(d=>{setLogs((d.logs||[]).filter(l=>l.id).sort((a,b)=>new Date(b.timestamp||0)-new Date(a.timestamp||0)));setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const filtered=logs.filter(l=>{
    if(fUser!=="all"&&l.user_id!==fUser)return false;
    if(fAction!=="all"&&!l.action?.includes(fAction))return false;
    if(q&&!(l.action+"|"+(l.comment||"")).toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });

  const getJobTitle=id=>{const j=jobs.find(j=>j.id===id);return j?(lang==="lo"&&j.title_lao?j.title_lao:j.title):(id||"—");};
  const actionTypes=["all","job_created","job_updated","Status","Progress","Notes"];
  const actionColor=a=>a?.includes("created")?"#16a34a":a?.includes("Status→done")?"#16a34a":a?.includes("Status")?"#2563eb":a?.includes("Progress")?"#7c3aed":a?.includes("Notes")?"#f59e0b":"#64748b";

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* Filter bar */}
    <div style={{background:DK.bg(),borderRadius:12,padding:"12px 16px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{fontWeight:700,color:DK.txt(),fontSize:14}}>📋 {lang==="lo"?"ປະຫວັດກິດຈະກໍາ":"Activity Log"}</div>
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:DK.txt5(),fontSize:12}}>🔍</span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder={lang==="lo"?"ຄົ້ນຫາ...":"Search..."}
          style={{...SS(),paddingLeft:26,minWidth:160,borderRadius:20,background:DK.bg2(),border:`1px solid ${DK.bdr2()}`,fontSize:12}}/>
      </div>
      <select value={fUser} onChange={e=>setFUser(e.target.value)} style={{...SS(),minWidth:130,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
        <option value="all">{lang==="lo"?"ທຸກຄົນ":"All Users"}</option>
        {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      <select value={fAction} onChange={e=>setFAction(e.target.value)} style={{...SS(),minWidth:130,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
        {actionTypes.map(a=><option key={a} value={a}>{a==="all"?"All Actions":a}</option>)}
      </select>
      <span style={{marginLeft:"auto",fontSize:12,color:DK.txt5()}}>{filtered.length} {lang==="lo"?"ລາຍການ":"entries"}</span>
    </div>

    <div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
      {loading&&<div style={{padding:32,textAlign:"center",color:DK.txt5()}}>⏳ Loading...</div>}

              <span style={{fontWeight:700,color:DK.txt2(),fontSize:12}}>{u?.name||l.user_id||"?"}</span>
              <span style={{fontSize:11,padding:"1px 7px",borderRadius:99,background:ac+"18",color:ac,fontWeight:600}}>{l.action?.replace("job_","").replace("_"," ")}</span>
            </div>
            <div style={{fontSize:11,color:DK.txt3(),marginTop:2}}><span style={{color:DK.txt4()}}>Job: </span>{getJobTitle(l.job_id)}</div>
            {l.comment&&<div style={{fontSize:11,color:DK.txt4(),marginTop:2,fontStyle:"italic"}}>{l.comment}</div>}

        </div>;
      })}
    </div>
  </div>;
}

// ── MONTH-END CLOSE PAGE ────────────────────────────────────────
function MonthEndPage({jobs,projects,users,user,getUser,lang,onInlineUpdate,saving,onEdit}){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth()+1;
  const [expandedId,setExpandedId]=useState(null);
  const [signedOff,setSignedOff]=useState(()=>{try{return JSON.parse(localStorage.getItem(`me_signoff_${y}_${m}`)||"false");}catch{return false;}});

  // Month-end relevant categories
  const ME_CATS=["Month-End Close","Bank Reconciliation","Accounts Payable","Accounts Receivable","Financial Report","Month-End Close","Year-End Close","Payroll","Tax Filing","Management Reporting"];

  // Get all jobs relevant to this month
  const monthStart=`${y}-${String(m).padStart(2,"0")}-01`;
  const monthEnd=`${y}-${String(m).padStart(2,"0")}-31`;
  const meJobs=jobs.filter(j=>{
    const due=String(j.due_date).slice(0,10);
    const isMonthly=j.id&&j.id.startsWith("mj_")&&j.id.includes(`_${y}_${m}`);
    const isDuThisMonth=due>=monthStart&&due<=monthEnd;
    const isMeCat=ME_CATS.includes(j.category);
    return (isMonthly||isDuThisMonth)&&(user.role==="leader"||j.assignee_id===user.id);
  });

  const total=meJobs.length;
  const done=meJobs.filter(j=>j.status==="done").length;
  const pct=total?Math.round(done/total*100):0;
  const allDone=pct===100;
  const overdue=meJobs.filter(j=>String(j.due_date).slice(0,10)<now.toISOString().slice(0,10)&&j.status!=="done");
  const blocked=meJobs.filter(j=>j.status==="blocked");

  const signOff=()=>{
    if(!allDone&&!window.confirm("Not all jobs are done. Sign off anyway?"))return;
    const ts=new Date().toLocaleString();
    setSignedOff({by:user.name,at:ts});
    localStorage.setItem(`me_signoff_${y}_${m}`,JSON.stringify({by:user.name,at:ts}));
  };

  const printMonthEnd=()=>{
    const win=window.open("","_blank");
    if(!win)return;
    const rows=meJobs.sort((a,b)=>(a.status==="done"?1:0)-(b.status==="done"?1:0)||(PO[a.priority]||9)-(PO[b.priority]||9)).map(j=>{
      const od=String(j.due_date).slice(0,10)<now.toISOString().slice(0,10)&&j.status!=="done";
      const notes=renderNotesHTML(j.notes);
      return `<tr style="${j.status==="done"?"opacity:0.7":""}">
        <td><strong>${lang==="lo"&&j.title_lao?j.title_lao:j.title}</strong>${notes?`<div style="margin-top:4px">${notes}</div>`:""}
        </td>
        <td>${getUser(j.assignee_id)?.name||"—"}</td>
        <td><span class="b ${j.status}">${STATUS[j.status]?.en||j.status}</span></td>
        <td style="color:${od?"#dc2626":"inherit"}">${od?"⚠ ":""}${cleanDate(j.due_date)}</td>
        <td>${j.progress||0}%</td>
      </tr>`;}).join("");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Month-End Close</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&family=Noto+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>*{box-sizing:border-box}body{font-family:'Noto Sans','Noto Sans Lao',Arial,sans-serif;padding:24px 28px;font-size:12px;color:#1e293b}
    h1{font-size:18px;font-weight:800;margin-bottom:4px}
    .meta{color:#64748b;font-size:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #e2e8f0}
    .kpi{display:flex;gap:12px;margin-bottom:18px}
    .k{background:#f8fafc;border-radius:8px;padding:10px 16px;flex:1;border-top:3px solid #2563eb}
    .k .n{font-size:22px;font-weight:800;color:#0f172a}.k .l{font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:600}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th{background:#0f172a;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase}
    td{padding:6px 10px;border-bottom:1px solid #e8edf5;vertical-align:top}
    tr:nth-child(even) td{background:#f9fafb}
    .b{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;display:inline-block}
    .done{background:#f0fdf4;color:#16a34a}.in-progress{background:#eff6ff;color:#2563eb}
    .todo{background:#f1f5f9;color:#64748b}.blocked{background:#fef2f2;color:#dc2626}
    .signoff{margin-top:24px;padding:12px 16px;border:2px solid ${allDone?"#16a34a":"#f59e0b"};border-radius:8px;background:${allDone?"#f0fdf4":"#fffbeb"}}
    @media print{body{padding:10px 14px}@page{margin:12mm}}</style></head><body>
    <h1>📅 Month-End Close Checklist — ${String(m).padStart(2,"0")}/${y}</h1>
    <div class="meta">Generated: ${now.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})} · Manager: ${user.name}</div>
    <div class="kpi">
      <div class="k" style="border-color:#2563eb"><div class="n">${total}</div><div class="l">Total Tasks</div></div>
      <div class="k" style="border-color:#16a34a"><div class="n">${done}</div><div class="l">Completed</div></div>
      <div class="k" style="border-color:#f59e0b"><div class="n">${pct}%</div><div class="l">Progress</div></div>
      <div class="k" style="border-color:#dc2626"><div class="n">${overdue.length}</div><div class="l">Overdue</div></div>
    </div>
    <table><thead><tr><th>Task / Notes</th><th>Assignee</th><th>Status</th><th>Due</th><th>%</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="signoff">
      ${signedOff?`<strong style="color:${allDone?"#16a34a":"#92400e"}">✓ Signed off by ${signedOff.by} at ${signedOff.at}</strong>`:`<strong style="color:#92400e">⚠ Not yet signed off</strong>`}
    </div>
    </body></html>`);
    win.document.close();setTimeout(()=>win.print(),900);
  };

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* Header + sign-off */}
    <div style={{background:allDone?"linear-gradient(135deg,#14532d,#16a34a)":"linear-gradient(135deg,#1e3a5f,#2563eb)",borderRadius:14,padding:"18px 22px",marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{color:allDone?"#bbf7d0":"#93c5fd",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>
            📅 {lang==="lo"?"ສະຫຼຸບສິ້ນເດືອນ":"Month-End Close"} — {String(m).padStart(2,"0")}/{y}
          </div>
          <div style={{color:"#fff",fontSize:22,fontWeight:800}}>{done}/{total} {lang==="lo"?"ສໍາເລັດ":"tasks done"} · {pct}%</div>
          {overdue.length>0&&<div style={{color:"#fca5a5",fontSize:12,marginTop:4}}>⚠ {overdue.length} {lang==="lo"?"ວຽກເກີນກໍານົດ":"overdue"}</div>}
          {signedOff&&<div style={{color:"#86efac",fontSize:11,marginTop:4}}>✓ Signed off by {signedOff.by} · {signedOff.at}</div>}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={printMonthEnd} style={{...BS("rgba(255,255,255,0.15)"),border:"1px solid rgba(255,255,255,0.3)",fontSize:12}}>↓ PDF</button>
          {user.role==="leader"&&!signedOff&&<button onClick={signOff}
            style={{...BS(allDone?"#16a34a":"#f59e0b"),fontSize:12,fontWeight:700}}>
            {allDone?"✓ Sign Off Month":"Sign Off Anyway"}
          </button>}
          {signedOff&&user.role==="leader"&&<button onClick={()=>{setSignedOff(false);localStorage.removeItem(`me_signoff_${y}_${m}`);}}
            style={{...BS("rgba(255,255,255,0.1)"),border:"1px solid rgba(255,255,255,0.2)",fontSize:12}}>↩ Undo Sign-off</button>}
        </div>
      </div>
      {/* Master progress bar */}
      <div style={{marginTop:14,height:10,background:"rgba(255,255,255,0.15)",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:allDone?"#4ade80":"#60a5fa",borderRadius:99,transition:"width 0.8s"}}/>
      </div>
    </div>

    {/* Alert strip */}
    {(overdue.length>0||blocked.length>0)&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 16px",marginBottom:12,display:"flex",gap:16,flexWrap:"wrap"}}>
      {overdue.length>0&&<span style={{fontSize:12,color:"#dc2626",fontWeight:600}}>⚠ {overdue.length} overdue: {overdue.map(j=>lang==="lo"&&j.title_lao?j.title_lao:j.title).join(", ")}</span>}
      {blocked.length>0&&<span style={{fontSize:12,color:"#f59e0b",fontWeight:600}}>🚫 {blocked.length} blocked</span>}
    </div>}

    {/* Job checklist */}
    <div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${DK.bdr3()}`,fontSize:13,fontWeight:700,color:DK.txt()}}>
        {lang==="lo"?"ລາຍການວຽກ":"Task List"} ({total})
      </div>
      {meJobs.sort((a,b)=>(a.status==="done"?1:0)-(b.status==="done"?1:0)||(PO[a.priority]||9)-(PO[b.priority]||9)).map(j=>{
        const od=String(j.due_date).slice(0,10)<now.toISOString().slice(0,10)&&j.status!=="done";
        const pg=Number(j.progress)||0;
        const isDone=j.status==="done";
        const isEx=expandedId===j.id;
        return <div key={j.id} style={{borderBottom:`1px solid ${DK.bdr3()}`}}>
          <div onClick={()=>setExpandedId(isEx?null:j.id)}
            style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",cursor:"pointer",background:isDone?"#f9fafb":isEx?"#eff6ff":"",opacity:isDone?0.7:1,transition:"background 0.1s"}}
            onMouseEnter={e=>{if(!isEx&&!isDone)e.currentTarget.style.background="#f8fafc";}}

              {isDone&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}

            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>

                <span style={{fontSize:10,color:DK.txt4(),fontWeight:600}}>{pg}%</span>
              </div>
              <Badge status={j.status} lang={lang}/>
