body{font-family:'DM Sans','Noto Sans Lao',sans-serif;background:var(--bg);color:var(--text);}
/* Inputs flip automatically via CSS - browsers respect CSS vars on form elements */

  color:#e2e8f0!important;

button{cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;}

// API
async function apiGet(p){
  try{const r=await fetch(API+"?"+new URLSearchParams(p).toString());const tx=await r.text();const d=JSON.parse(tx);return sanitize(d);}catch(e){return{error:String(e)};}
}
async function apiPost(b){
  try{
    // Safest approach: encode JSON as a plain string value in URLSearchParams body.
    // URLSearchParams handles ALL special chars (%, &, Lao, emoji, quotes) correctly.
    // Apps Script doPost reads e.parameter.body directly — no URL involved at all.
    const json=JSON.stringify(b);
    const params=new URLSearchParams();
    params.set("body",json);
    const r=await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:params.toString()
    });
    const tx=await r.text();
    return JSON.parse(tx);
  }catch(e){return{error:String(e)};}
}
function sanitize(o){
  if(Array.isArray(o))return o.map(sanitize);
  if(o&&typeof o==="object"){const n={};for(const k of Object.keys(o)){const v=o[k];if(typeof v==="string"&&v.match(/^\d{4}-\d{2}-\d{2}T/))n[k]=v.slice(0,10);else if(v instanceof Date)n[k]=v.toISOString().slice(0,10);else if(v&&typeof v==="object"&&!Array.isArray(v))n[k]=sanitize(v);else n[k]=v;}return n;}return o;
}

function Lbl({label,children}){return <div style={{marginBottom:12}}><label style={{display:"block",fontSize:11,fontWeight:700,color:DK.txt3(),marginBottom:5,textTransform:"uppercase",letterSpacing:0.3}}>{label}</label>{children}</div>;}

function PriDot({priority,lang}){const c=PRIORITY[priority]||{en:priority,lo:priority,c:"#94a3b8"};return <span style={{fontSize:12,fontWeight:700,color:c.c,whiteSpace:"nowrap"}}>● {c[lang]||c.en}</span>;}
function Avtr({user,size=30,showName=false}){
  if(!user)return <span style={{color:DK.txt5()}}>—</span>;
  return <div style={{display:"flex",alignItems:"center",gap:7}}>
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:user.role==="leader"?"linear-gradient(135deg,#3b82f6,#7c3aed)":"linear-gradient(135deg,#06b6d4,#10b981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.max(9,size*0.34),fontWeight:700,color:"#fff"}}>
      {user.avatar||(user.name||"?")[0]}
    </div>
    {showName&&<span style={{fontSize:12,color:"#475569",fontWeight:500}}>{user.name?.split(" ")[0]}</span>}
  </div>;
}
function Modal({title,onClose,onSave,saveLabel="Save",saveColor="#2563eb",saving,children,wide=false}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:DK.bg(),borderRadius:16,padding:26,width:wide?660:540,maxHeight:"92vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.4)",animation:"fadeUp 0.2s ease",border:`1px solid ${DK.bdr()}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{fontSize:17,fontWeight:700,color:DK.txt()}}>{title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:DK.txt5(),padding:4}}>✕</button>
      </div>
      {children}
      {onSave&&<div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:18}}>
        <button onClick={onClose} style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${DK.bdr()}`,background:DK.bg2(),fontWeight:600,color:"#475569"}}>{T.en.cancel}</button>
        <button onClick={onSave} disabled={saving} style={{...BS(saveColor),padding:"9px 22px",opacity:saving?0.7:1}}>{saving?"Saving...":saveLabel}</button>
      </div>}
    </div>
  </div>;
}

function Login({onLogin,lang,setLang}){

  const doLogin=async()=>{
    setLoading(true);setErr("");
    try{
      const res=await apiGet({action:"login",email,password:pwd});
      if(res.success){const all=await apiGet({action:"getAll"});onLogin(res.user,all.users||[],all.projects||[],all.jobs||[],all.monthly||[],all.pending||[],all.board||[]);}
      else{setErr(res.error||"Login failed");setShake(true);setTimeout(()=>setShake(false),600);}

        <div style={{fontSize:11,letterSpacing:4,color:"#3b82f6",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>FS Taskflow v9</div>

// ── DATE CLEANER — strips ISO timezone junk, returns "Mar 10" ──
function cleanDate(raw){
  if(!raw)return"—";
  // Handle "2026-03-10T17:00:00.000Z" or "2026-03-10" → "Mar 10"
  try{
    const s=String(raw).slice(0,10); // "2026-03-10"
    const [y,mo,d]=s.split("-").map(Number);
    if(!y||!mo||!d)return String(raw).slice(0,10);
    return new Date(y,mo-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric"});
  }catch(e){return String(raw).slice(0,10);}
}

// Notes are stored as JSON string: [{id,text,done,tag},...] or plain text (legacy)
function parseNotes(raw){
  if(!raw)return[];
  try{
    const p=JSON.parse(raw);
    if(Array.isArray(p))return p;
  }catch(e){}
  // Legacy plain text — split by newline into items
  return raw.split("\n").filter(l=>l.trim()).map((l,i)=>({
    id:"n"+i,
    text:l.replace(/^[✓•\-\*→⚠]\s*/,""),
    done:l.startsWith("✓"),
    tag:l.startsWith("⚠")?"blocker":l.startsWith("→")?"next":""
  }));
}
function serializeNotes(items){
  return JSON.stringify(items);
}
// Render notes for display (reports, project view, etc.) — returns HTML string for PDF or JSX for web
function renderNotesHTML(raw){
  if(!raw)return"";
  const items=parseNotes(raw);
  if(!items.length)return"";
  const TAG_COLORS={blocker:"#dc2626",next:"#2563eb",info:"#64748b",done:"#16a34a"};
  return items.map(it=>{
    const col=it.done?"#16a34a":it.tag==="blocker"?"#dc2626":it.tag==="next"?"#2563eb":"#64748b";
    const tagHtml=it.tag?`<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${TAG_COLORS[it.tag]||"#e2e8f0"}22;color:${TAG_COLORS[it.tag]||"#64748b"};font-weight:700;margin-left:4px">${it.tag}</span>`:"";
    return `<div style="display:flex;align-items:baseline;gap:5px;margin-bottom:2px;font-size:10px;color:${col};text-decoration:${it.done?"line-through":"none"}">${it.done?"☑":"☐"} ${it.text}${tagHtml}</div>`;
  }).join("");
}
function RenderNotesJSX({raw,compact=false}){
  const items=parseNotes(raw);
  if(!items.length)return null;
  const TAG_C={blocker:"#dc2626",next:"#2563eb",info:"#0369a1",done:"#16a34a"};
  const doneCount=items.filter(i=>i.done).length;
  return <div>
    {!compact&&items.length>1&&<div style={{fontSize:10,color:DK.txt5(),marginBottom:3}}>{doneCount}/{items.length} done</div>}
    {items.map(it=>(
      <div key={it.id} style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:2}}>
        <span style={{fontSize:11,color:it.done?"#16a34a":"#94a3b8",flexShrink:0}}>{it.done?"☑":"☐"}</span>
        <span style={{fontSize:compact?11:12,color:it.done?"#94a3b8":"#374151",textDecoration:it.done?"line-through":"none",flex:1,lineHeight:1.4}}>{it.text}</span>
        {it.tag&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:(TAG_C[it.tag]||"#64748b")+"18",color:TAG_C[it.tag]||"#64748b",fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{it.tag}</span>}
      </div>
    ))}
  </div>;
}

// ── NOTE CHECKLIST EDITOR ──────────────────────────────────────
function NoteChecklist({raw,onChange,canEdit,lang}){
  const [items,setItems]=useState(()=>parseNotes(raw));
  const [newText,setNewText]=useState("");
  const [newTag,setNewTag]=useState("");
  const inputRef=useRef(null);

  // Sync upward whenever items change
  const update=(next)=>{setItems(next);onChange(serializeNotes(next));};

  const toggleDone=(id)=>update(items.map(it=>it.id===id?{...it,done:!it.done}:it));
  const editText=(id,text)=>update(items.map(it=>it.id===id?{...it,text}:it));
  const editTag=(id,tag)=>update(items.map(it=>it.id===id?{...it,tag}:it));
  const removeItem=(id)=>update(items.filter(it=>it.id!==id));
  const addItem=()=>{
    if(!newText.trim())return;
    update([...items,{id:"n"+Date.now(),text:newText.trim(),done:false,tag:newTag}]);
    setNewText("");setNewTag("");
    setTimeout(()=>inputRef.current?.focus(),50);
  };
  const moveUp=(i)=>{if(i===0)return;const n=[...items];[n[i-1],n[i]]=[n[i],n[i-1]];update(n);};
  const moveDown=(i)=>{if(i===items.length-1)return;const n=[...items];[n[i],n[i+1]]=[n[i+1],n[i]];update(n);};

  const TAGS=[{v:"",l:"—"},{v:"blocker",l:"🚫 Blocker"},{v:"next",l:"→ Next"},{v:"info",l:"ℹ Info"},{v:"done",l:"✓ Done"}];
  const TAG_C={blocker:"#dc2626",next:"#2563eb",info:"#0369a1",done:"#16a34a"};

  const doneCount=items.filter(i=>i.done).length;

  return <div style={{display:"flex",flexDirection:"column",gap:0}}>
    {/* Progress summary */}
    {items.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
      <div style={{flex:1,height:5,background:DK.bg3(),borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${items.length?Math.round(doneCount/items.length*100):0}%`,background:"#16a34a",borderRadius:99,transition:"width 0.3s"}}/>
      </div>
      <span style={{fontSize:11,color:DK.txt4(),fontWeight:600,whiteSpace:"nowrap"}}>{doneCount}/{items.length} {lang==="lo"?"ສໍາເລັດ":"done"}</span>
    </div>}

    {/* Items list */}
    <div style={{maxHeight:220,overflowY:"auto",marginBottom:8}}>
      {items.length===0&&<div style={{color:DK.txt5(),fontSize:12,textAlign:"center",padding:"12px 0"}}>{lang==="lo"?"ຍັງບໍ່ມີລາຍການ":"No items yet — add one below"}</div>}
      {items.map((it,i)=>(
        <div key={it.id} style={{display:"flex",alignItems:"flex-start",gap:6,padding:"5px 4px",borderRadius:7,background:it.done?"#f0fdf4":"#fff",marginBottom:3,border:"1px solid",borderColor:it.done?"#bbf7d0":"#f1f5f9",transition:"background 0.15s"}}>
          {/* Checkbox */}
          <button onClick={()=>canEdit&&toggleDone(it.id)} disabled={!canEdit}
            style={{width:20,height:20,borderRadius:4,border:`2px solid ${it.done?"#16a34a":"#d1d5db"}`,background:it.done?"#16a34a":"#fff",flexShrink:0,cursor:canEdit?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",marginTop:2,transition:"all 0.15s"}}>
            {it.done&&<span style={{color:"#fff",fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
          </button>
          {/* Text */}
          <div style={{flex:1,minWidth:0}}>
            {canEdit
              ? <input value={it.text} onChange={e=>editText(it.id,e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addItem();}if(e.key==="Backspace"&&it.text===""&&items.length>0){e.preventDefault();removeItem(it.id);}}}
                  style={{...IS(),padding:"2px 6px",fontSize:12,textDecoration:it.done?"line-through":"none",color:it.done?"#94a3b8":"#1e293b",background:"transparent",border:"1px solid transparent",borderRadius:4,width:"100%"}}
                  onFocus={e=>e.target.style.borderColor="#e2e8f0"}
                  onBlur={e=>e.target.style.borderColor="transparent"}/>
              : <span style={{fontSize:12,color:it.done?"#94a3b8":"#1e293b",textDecoration:it.done?"line-through":"none",lineHeight:"20px",display:"block",padding:"2px 6px"}}>{it.text}</span>
            }
          </div>
          {/* Tag pill */}
          {it.tag&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:99,background:(TAG_C[it.tag]||"#64748b")+"18",color:TAG_C[it.tag]||"#64748b",fontWeight:700,flexShrink:0,marginTop:4,whiteSpace:"nowrap"}}>{it.tag}</span>}
          {/* Actions */}
          {canEdit&&<div style={{display:"flex",gap:2,flexShrink:0,marginTop:2,opacity:0.5}}>
            <button onClick={()=>moveUp(i)} title="Move up" style={{width:16,height:16,border:"none",background:"none",cursor:"pointer",fontSize:9,color:DK.txt5(),padding:0,lineHeight:1}}>▲</button>
            <button onClick={()=>moveDown(i)} title="Move down" style={{width:16,height:16,border:"none",background:"none",cursor:"pointer",fontSize:9,color:DK.txt5(),padding:0,lineHeight:1}}>▼</button>
            {canEdit&&<select value={it.tag} onChange={e=>editTag(it.id,e.target.value)}
              style={{fontSize:9,border:`1px solid ${DK.bdr()}`,borderRadius:3,padding:"1px 2px",color:DK.txt5(),background:DK.bg(),cursor:"pointer",height:16}}>
              {TAGS.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>}
            <button onClick={()=>removeItem(it.id)} title="Remove" style={{width:16,height:16,border:"none",background:"none",cursor:"pointer",fontSize:11,color:"#fca5a5",padding:0,lineHeight:1}}>✕</button>
          </div>}
        </div>
      ))}
    </div>

    {/* Add new item row */}
    {canEdit&&<div style={{display:"flex",gap:5,alignItems:"center",padding:"6px 8px",background:DK.bg2(),borderRadius:8,border:`1px solid ${DK.bdr2()}`}}>
      <span style={{fontSize:14,color:DK.txt5(),flexShrink:0}}>+</span>
      <input ref={inputRef} value={newText} onChange={e=>setNewText(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&addItem()}
        placeholder={lang==="lo"?"ເພີ່ມລາຍການ...":"Add item... (Enter to add)"}
        style={{...IS(),flex:1,padding:"5px 8px",fontSize:12,background:"transparent",border:"none",outline:"none"}}/>
      <select value={newTag} onChange={e=>setNewTag(e.target.value)}
        style={{fontSize:11,border:`1px solid ${DK.bdr()}`,borderRadius:6,padding:"4px 6px",color:DK.txt4(),background:DK.bg(),cursor:"pointer",flexShrink:0}}>
        {TAGS.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
      </select>
      <button onClick={addItem} disabled={!newText.trim()}
        style={{...BS("#2563eb"),padding:"5px 12px",fontSize:12,opacity:newText.trim()?1:0.4}}>
        {lang==="lo"?"ເພີ່ມ":"Add"}
      </button>
    </div>}
  </div>;
}


function JobDetailPanel({job,user,getUser,projects,lang,onSave,onClose,saving}){
  const t=T[lang];
  const [pg,setPg]=useState(Number(job.progress)||0);
  const [status,setStatus]=useState(job.status||"todo");
  const [actHrs,setActHrs]=useState(Number(job.actual_hours)||0);
  const [notes,setNotes]=useState(job.notes||"");
  const [dirty,setDirty]=useState(false);
  const [pgInput,setPgInput]=useState(String(Number(job.progress)||0)); // direct text input for %
  const mark=(k,v)=>{if(k==="progress"){setPg(v);setPgInput(String(v));}if(k==="status")setStatus(v);if(k==="actual_hours")setActHrs(v);if(k==="notes")setNotes(v);setDirty(true);};
  const handleSave=()=>onSave({...job,progress:pg,status,actual_hours:actHrs,notes});
  const od=new Date(String(job.due_date).slice(0,10))<new Date()&&status!=="done";
  const pgColor=pg===100?"#16a34a":pg>=70?"#3b82f6":pg>=30?"#f59e0b":"#dc2626";
  const canEdit=user.role==="leader"||job.assignee_id===user.id;

  // Days running: how long this job has been in-progress
  const startD=job.start_date?new Date(String(job.start_date).slice(0,10)):null;
  const daysRunning=startD?Math.max(0,Math.round((new Date()-startD)/(1000*60*60*24))):null;
  const daysLeft=job.due_date?Math.round((new Date(String(job.due_date).slice(0,10))-new Date())/(1000*60*60*24)):null;
  const isLongRunning=daysRunning!==null&&daysRunning>14&&status!=="done";
  const expectedPg=daysRunning!==null&&daysLeft!==null&&(daysRunning+Math.max(0,daysLeft))>0
    ?Math.round(daysRunning/(daysRunning+Math.max(0,daysLeft))*100):null;
  const isBehind=expectedPg!==null&&pg<expectedPg-15;

  return (
    <div style={{background:DK.bg2(),borderTop:"2px solid #dbeafe",padding:"16px 20px 18px",animation:"fadeUp 0.18s ease"}}>
      {/* Long-running job warning banner */}
      {isLongRunning&&<div style={{marginBottom:12,padding:"8px 14px",borderRadius:8,background:isBehind?"#fef2f2":"#fefce8",border:`1px solid ${isBehind?"#fca5a5":"#fde047"}`,display:"flex",alignItems:"center",gap:8,fontSize:12}}>
        <span style={{fontSize:15}}>{isBehind?"⚠️":"⏳"}</span>
        <div>
          <span style={{fontWeight:700,color:isBehind?"#dc2626":"#92400e"}}>
            {isBehind
              ?(lang==="lo"?"ວຽກນີ້ລ້າຊ້າກ່ວາແຜນ":"This job is behind schedule")
              :(lang==="lo"?"ວຽກດໍາເນີນມາ "+daysRunning+" ວັນ":"Running for "+daysRunning+" days")}
          </span>
          {isBehind&&<span style={{color:"#dc2626",marginLeft:6}}>— expected ~{expectedPg}%, current {pg}%</span>}
          {daysLeft!==null&&<span style={{color:DK.txt5(),marginLeft:6}}>· {daysLeft>0?daysLeft+" days left":Math.abs(daysLeft)+" days overdue"}</span>}
        </div>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:16}}>
        {/* LEFT — Progress + Status */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Progress card */}
          <div style={{background:DK.bg(),borderRadius:10,padding:"12px 14px",border:`1px solid ${DK.bdr2()}`}}>
            <div style={{fontSize:10,fontWeight:700,color:DK.txt5(),textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>{lang==="lo"?"ຄວາມຄືບໜ້າ":"Progress"}</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
              {/* Mini ring */}
              <svg width="64" height="64" viewBox="0 0 100 100" style={{flexShrink:0}}>
                <circle cx="50" cy="50" r="42" fill="none" stroke="#f1f5f9" strokeWidth="12"/>
                {/* Expected progress ghost ring */}
                {expectedPg!==null&&<circle cx="50" cy="50" r="42" fill="none" stroke="#e2e8f0" strokeWidth="4"
                  strokeDasharray={`${2*Math.PI*42}`}
                  strokeDashoffset={`${2*Math.PI*42*(1-expectedPg/100)}`}
                  strokeLinecap="round" transform="rotate(-90 50 50)" strokeOpacity="0.6"/>}
                <circle cx="50" cy="50" r="42" fill="none" stroke={pgColor} strokeWidth="12"
                  strokeDasharray={`${2*Math.PI*42}`}
                  strokeDashoffset={`${2*Math.PI*42*(1-pg/100)}`}
                  strokeLinecap="round" transform="rotate(-90 50 50)"
                  style={{transition:"stroke-dashoffset 0.35s ease"}}/>
                <text x="50" y="56" textAnchor="middle" fontSize="22" fontWeight="800" fill="#0f172a">{pg}%</text>
              </svg>
              <div style={{flex:1}}>
                <input type="range" min="0" max="100" step="1" value={pg} onChange={e=>mark("progress",+e.target.value)}
                  disabled={!canEdit} style={{width:"100%",accentColor:pgColor,marginBottom:6}}/>
                {/* Direct % input */}
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}>
                  <input type="number" min="0" max="100" value={pgInput}
                    onChange={e=>{setPgInput(e.target.value);}}
                    onBlur={e=>{const v=Math.min(100,Math.max(0,+e.target.value||0));mark("progress",v);}}
                    onKeyDown={e=>e.key==="Enter"&&mark("progress",Math.min(100,Math.max(0,+pgInput||0)))}
                    readOnly={!canEdit}
                    style={{...IS(),width:58,textAlign:"center",padding:"4px 6px",fontSize:13,fontWeight:700}}/>
                  <span style={{fontSize:11,color:DK.txt5()}}>%</span>
                  {expectedPg!==null&&<span style={{fontSize:10,color:DK.txt5(),marginLeft:2}}>expected {expectedPg}%</span>}
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {[0,10,25,50,75,90,100].map(v=>(
                    <button key={v} onClick={()=>canEdit&&mark("progress",v)} disabled={!canEdit}
                      style={{flex:1,padding:"3px 0",borderRadius:5,border:`1.5px solid ${pg===v?pgColor:"#e2e8f0"}`,background:pg===v?pgColor+"18":"#fff",color:pg===v?pgColor:"#94a3b8",fontSize:10,fontWeight:700,cursor:canEdit?"pointer":"default",minWidth:24}}>
                      {v}%
                    </button>
                  ))}
                </div>
              </div>
            </div>
            {/* Days info */}
            {(daysRunning!==null||daysLeft!==null)&&<div style={{display:"flex",gap:8,paddingTop:8,borderTop:`1px solid ${DK.bdr3()}`,fontSize:10,color:DK.txt5()}}>
              {daysRunning!==null&&<span>▶ {daysRunning}d {lang==="lo"?"ແລ້ວ":"running"}</span>}
              {daysLeft!==null&&<span style={{color:daysLeft<0?"#dc2626":daysLeft<3?"#f59e0b":"#94a3b8",fontWeight:daysLeft<3?700:400}}>{daysLeft<0?"⚠ "+Math.abs(daysLeft)+"d overdue":daysLeft===0?"Due today":"◷ "+daysLeft+"d left"}</span>}
            </div>}
          </div>

          {/* Status buttons — compact 2-col */}
          <div style={{background:DK.bg(),borderRadius:10,padding:"12px 14px",border:`1px solid ${DK.bdr2()}`}}>
            <div style={{fontSize:10,fontWeight:700,color:DK.txt5(),textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>{lang==="lo"?"ສະຖານະ":"Status"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              {Object.entries(STATUS).map(([k,v])=>(
                <button key={k} onClick={()=>canEdit&&mark("status",k)} disabled={!canEdit}
                  style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",borderRadius:7,border:`1.5px solid ${status===k?v.c:"#e2e8f0"}`,background:status===k?v.bg:"#fff",cursor:canEdit?"pointer":"default",transition:"all 0.1s"}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:v.c,flexShrink:0}}/>
                  <span style={{fontSize:11,fontWeight:status===k?700:500,color:status===k?v.c:"#64748b",flex:1,textAlign:"left"}}>{v[lang]||v.en}</span>
                  {status===k&&<span style={{fontSize:10,color:v.c}}>✓</span>}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* RIGHT — Notes Checklist */}
        <div style={{background:DK.bg(),borderRadius:10,padding:"14px 16px",border:`1px solid ${DK.bdr2()}`,display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:DK.txt5(),textTransform:"uppercase",letterSpacing:0.5}}>
              ☑ {lang==="lo"?"ລາຍການ / ຄວາມຄືບໜ້າ":"Checklist / Progress Log"}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {od&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fef2f2",padding:"2px 7px",borderRadius:99}}>⚠ {lang==="lo"?"ເກີນກໍານົດ":"Overdue"}</span>}
              <Badge status={status} lang={lang}/>
            </div>
          </div>
          <NoteChecklist raw={notes} onChange={v=>{setNotes(v);setDirty(true);}} canEdit={canEdit} lang={lang}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:8,borderTop:`1px solid ${DK.bdr3()}`}}>
            <div style={{fontSize:11,color:DK.txt5()}}>{lang==="lo"?"ອັບເດດລ່າສຸດ: ":"Last updated: "}{cleanDate(job.updated_at)}</div>
            {dirty&&<span style={{fontSize:11,color:"#f59e0b",fontWeight:600}}>● {lang==="lo"?"ມີການປ່ຽນແປງ":"Unsaved changes"}</span>}
          </div>
        </div>
      </div>

      {/* Action bar */}
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}>
        <button onClick={onClose} style={{padding:"6px 16px",borderRadius:8,border:`1px solid ${DK.bdr()}`,background:DK.bg(),color:DK.txt4(),fontWeight:600,fontSize:13,cursor:"pointer"}}>{lang==="lo"?"ປິດ":"Close"}</button>
        {canEdit&&<button onClick={handleSave} disabled={saving||!dirty}
          style={{...BS(dirty?"#16a34a":"#94a3b8"),padding:"6px 20px",fontSize:13,opacity:(saving||!dirty)?0.55:1,cursor:dirty&&!saving?"pointer":"default"}}>
          {saving?(lang==="lo"?"ກໍາລັງບັນທຶກ...":"Saving..."):(lang==="lo"?"💾 ບັນທຶກ":"💾 Save")}
        </button>}
      </div>
    </div>
  );
}

// ── JOBS PAGE — grouped by project, click row to expand ────────
function JobsPage({allJobs,filterProj,setFilterProj,dashFilter,clearDashFilter,projects,users,user,getUser,onEdit,onDelete,onInlineUpdate,lang,loading,saving,dark=false}){
  const t=T[lang];
  const [fStatus,setFStatus]=useState("all");
  const [fPri,setFPri]=useState("all");
  const [fProj,setFProj]=useState(filterProj||"all");
  const [fUser,setFUser]=useState("all");
  const [q,setQ]=useState("");
  const [showDone,setShowDone]=useState(false);
  const [showHrs,setShowHrs]=useState(false);
  const [expandedId,setExpandedId]=useState(null);
  const [collapsedProj,setCollapsedProj]=useState({});

  useEffect(()=>{if(filterProj)setFProj(filterProj);},[filterProj]);
  useEffect(()=>{
    if(dashFilter==="in-progress"){setFStatus("in-progress");setShowDone(false);}
    else if(dashFilter==="done"){setFStatus("done");setShowDone(true);}
    else if(dashFilter==="overdue"){setFStatus("all");setShowDone(false);}
  },[dashFilter]);

  const filtered=allJobs.filter(j=>{
    if(user.role==="runner"&&j.assignee_id!==user.id)return false;
    if(!showDone&&j.status==="done")return false;
    if(fStatus!=="all"&&j.status!==fStatus)return false;
    if(fPri!=="all"&&j.priority!==fPri)return false;
    if(fProj!=="all"&&j.project_id!==fProj)return false;
    if(fUser!=="all"&&j.assignee_id!==fUser)return false;
    if(dashFilter==="overdue"&&!(new Date(String(j.due_date).slice(0,10))<new Date()&&j.status!=="done"))return false;
    if(q&&!(j.title+"|"+(j.title_lao||"")).toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9));

  const hasFilter=fStatus!=="all"||fPri!=="all"||fProj!=="all"||fUser!=="all"||q||showDone||dashFilter;
  const clearAll=()=>{setFStatus("all");setFPri("all");setFProj("all");setFUser("all");setQ("");setShowDone(false);setFilterProj(null);clearDashFilter();};
  const fmtDate=(d,od)=>{const s=cleanDate(d);return od?"⚠ "+s:s;};

  const grouped=useMemo(()=>{
    const map={};
    filtered.forEach(j=>{const pid=j.project_id||"__none__";if(!map[pid])map[pid]=[];map[pid].push(j);});
    const result=[];
    projects.forEach(p=>{if(map[p.id])result.push({proj:p,jobs:map[p.id]});});
    if(map["__none__"])result.push({proj:null,jobs:map["__none__"]});
    return result;
  },[filtered,projects]);

  const toggleProj=(pid)=>setCollapsedProj(p=>({...p,[pid||"__none__"]:!p[pid||"__none__"]}));
  const toggleRow=(id)=>setExpandedId(prev=>prev===id?null:id);

  const sc={active:"#2563eb",planning:"#7c3aed",completed:"#16a34a",paused:"#f59e0b"};

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* FILTER BAR */}
    <div style={{background:dark?"#161b22":"#ffffff",borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:dark?"0 1px 4px rgba(0,0,0,0.4)":"0 1px 4px rgba(0,0,0,0.06)",border:`1px solid ${dark?"#2d3748":"#e8edf5"}`}}>
      <div style={{display:"flex",gap:9,alignItems:"center",flexWrap:"nowrap",overflowX:"auto"}}>
        <div style={{position:"relative",flexShrink:0,minWidth:170}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:DK.txt5(),fontSize:13,pointerEvents:"none"}}>🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder={t.search}
            style={{...SS(),paddingLeft:30,borderRadius:20,background:DK.bg2(),border:`1px solid ${DK.bdr2()}`,minWidth:170}}/>
        </div>
        {[
          {val:fStatus,set:setFStatus,label:t.allStatus,opts:Object.entries(STATUS).map(([k,v])=>({k,l:v[lang]||v.en}))},
          {val:fPri,set:setFPri,label:t.allPriority,opts:Object.entries(PRIORITY).map(([k,v])=>({k,l:v[lang]||v.en}))},
          {val:fProj,set:(v)=>{setFProj(v);setFilterProj(v==="all"?null:v);},label:t.allProjects,opts:projects.map(p=>({k:p.id,l:lang==="lo"&&p.name_lao?p.name_lao:p.name}))},
          ...(user.role==="leader"?[{val:fUser,set:setFUser,label:lang==="lo"?"ທຸກຄົນ":"All Staff",opts:users.map(u=>({k:u.id,l:u.name}))}]:[]),
        ].map((dd,i)=>(
          <div key={i} style={{position:"relative",flexShrink:0}}>
            <select value={dd.val} onChange={e=>dd.set(e.target.value)}
              style={{...SS(),paddingRight:26,appearance:"none",WebkitAppearance:"none",background:DK.bg(),border:`1px solid ${DK.bdr()}`,borderRadius:8,minWidth:i===2?155:115,fontWeight:dd.val!=="all"?600:400,color:dd.val!=="all"?"#1e293b":"#64748b",cursor:"pointer"}}>
              <option value="all">{dd.label}</option>
              {dd.opts.map(o=><option key={o.k} value={o.k}>{o.l}</option>)}
            </select>
            <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:DK.txt5(),fontSize:10}}>▼</span>
          </div>
        ))}
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:DK.txt4(),cursor:"pointer",userSelect:"none",flexShrink:0,whiteSpace:"nowrap"}}>
          <input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)} style={{cursor:"pointer"}}/>{t.showDone}
        </label>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:DK.txt4(),cursor:"pointer",userSelect:"none",flexShrink:0,whiteSpace:"nowrap"}}>
          <input type="checkbox" checked={showHrs} onChange={e=>setShowHrs(e.target.checked)} style={{cursor:"pointer"}}/>{lang==="lo"?"ສະແດງຊມ":"Show Hrs"}
        </label>
        {hasFilter&&<button onClick={clearAll} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #fca5a5",background:"#fef2f2",color:"#dc2626",fontSize:12,fontWeight:600,whiteSpace:"nowrap",flexShrink:0,cursor:"pointer"}}>✕ {lang==="lo"?"ລ້າງ":"Clear"}</button>}
        <span style={{marginLeft:"auto",color:DK.txt5(),fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>{filtered.length} {lang==="lo"?"ວຽກ":"jobs"}</span>
      </div>
      {dashFilter&&<div style={{marginTop:7,display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:11,padding:"2px 10px",borderRadius:99,background:dashFilter==="overdue"?"#fef2f2":dashFilter==="done"?"#f0fdf4":"#eff6ff",color:dashFilter==="overdue"?"#dc2626":dashFilter==="done"?"#16a34a":"#2563eb",fontWeight:700}}>
          {dashFilter==="overdue"?"⚠ Overdue":dashFilter==="done"?"✓ Completed":"◑ In Progress"}
        </span>
        <button onClick={clearAll} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",fontWeight:700,cursor:"pointer"}}>✕</button>
      </div>}
      {fProj!=="all"&&<div style={{marginTop:7,display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:11,color:DK.txt4()}}>Project: <strong style={{color:"#2563eb"}}>{projects.find(p=>p.id===fProj)?.[lang==="lo"?"name_lao":"name"]||projects.find(p=>p.id===fProj)?.name}</strong></span>
        <button onClick={()=>{setFProj("all");setFilterProj(null);}} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",fontWeight:700,cursor:"pointer"}}>✕</button>
      </div>}
    </div>

    {/* GROUPED TABLE */}
    <div style={{background:dark?"#161b22":"#ffffff",borderRadius:12,boxShadow:dark?"0 1px 4px rgba(0,0,0,0.4)":"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden",border:`1px solid ${dark?"#2d3748":"#e8edf5"}`}}>
      {loading&&<div style={{textAlign:"center",padding:32,color:DK.txt5()}}>⏳ {t.loading}</div>}
      {!loading&&filtered.length===0&&<div style={{textAlign:"center",padding:40,color:DK.txt5()}}>{t.noJobs}</div>}
      {grouped.map(({proj,jobs:pJobs})=>{
        const pid=proj?.id||"__none__";
        const isCollapsed=collapsedProj[pid];
        const projColor=sc[proj?.status]||"#94a3b8";
        const dnCount=pJobs.filter(j=>j.status==="done").length;
        return (
          <div key={pid} style={{borderBottom:`2px solid ${dark?"#1a2235":"#e8edf5"}`}}>
            {/* ── PROJECT GROUP HEADER ── */}
            <div onClick={()=>toggleProj(pid)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",
                background:dark?"#141d2b":"#e8eef8",
                cursor:"pointer",userSelect:"none",
                borderLeft:`4px solid ${projColor}`,
                borderBottom:`1px solid ${dark?"#1e2d40":"#cdd6e8"}`}}
              onMouseEnter={e=>e.currentTarget.style.background=dark?"#1a2438":"#dde7f5"}
              onMouseLeave={e=>e.currentTarget.style.background=dark?"#141d2b":"#e8eef8"}>
              <span style={{fontSize:10,color:projColor,transition:"transform 0.2s",transform:isCollapsed?"rotate(-90deg)":"rotate(0deg)",flexShrink:0}}>▾</span>
              <div style={{width:8,height:8,borderRadius:2,background:projColor,flexShrink:0}}/>
              <span style={{fontWeight:800,color:dark?"#c7d4e8":"#1e3a5f",fontSize:13,letterSpacing:0.1}}>
                {proj?(lang==="lo"&&proj.name_lao?proj.name_lao:proj.name):(lang==="lo"?"ບໍ່ມີໂຄງການ":"No Project")}
              </span>
              {proj&&<span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:projColor+"25",color:projColor,fontWeight:700,textTransform:"capitalize"}}>{proj.status}</span>}
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:64,height:5,background:dark?"#1e2d3d":"#c8d4e8",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pJobs.length?Math.round(dnCount/pJobs.length*100):0}%`,background:projColor,borderRadius:99,transition:"width 0.4s"}}/>
                  </div>
                  <span style={{fontSize:11,color:dark?"#94a3b8":"#4a6480",fontWeight:700}}>{dnCount}/{pJobs.length}</span>
                </div>
              </div>
            </div>
            {/* JOB ROWS */}
            {!isCollapsed&&<>
              {/* Column headers */}
              <div style={{display:"grid",gridTemplateColumns:"28px 1fr 120px 100px 100px 76px 72px 88px"+(showHrs?" 78px":"")+" 120px",background:dark?"#111827":"#f5f7fc",borderBottom:`1px solid ${dark?"#1e2d40":"#dde5f0"}`,padding:"0 0"}}>
                {["","Job","Category","Assignee","Status","Priority","Due","Progress",...(showHrs?["Hours"]:[]),"Actions"].map((h,i)=>(
                  <div key={i} style={{padding:"6px 10px",fontSize:9,fontWeight:700,color:dark?"#4a5a7a":"#8899aa",textTransform:"uppercase",letterSpacing:0.5,overflow:"hidden",whiteSpace:"nowrap"}}>{h}</div>
                ))}
              </div>
              {pJobs.map(j=>{
                const od=new Date(String(j.due_date).slice(0,10))<new Date()&&j.status!=="done";
                const pg=Number(j.progress)||0;
                const isExpanded=expandedId===j.id;
                return (
                  <div key={j.id} style={{borderBottom:`1px solid ${dark?"#1a2235":"#edf1f7"}`}}>
                    {/* ROW */}
                    <div onClick={()=>toggleRow(j.id)}
                      style={{display:"grid",gridTemplateColumns:"28px 1fr 120px 100px 100px 76px 72px 88px"+(showHrs?" 78px":"")+" 120px",alignItems:"center",

function TemplateModal({initial,onClose,onSave,user,users,projects,lang}){
  const t=T[lang];
  const DAYS_EN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const DAYS_LO=["ອາທິດ","ຈັນ","ອັງຄານ","ພຸດ","ພະຫັດ","ສຸກ","ເສົາ"];

  const [f,setF]=useState(initial||{
    id:"",title:"",title_lao:"",description:"",
    project_id:projects[0]?.id||"",
    default_assignee_id:user.id,owner_id:user.id,
    priority:"high",category:"Month-End Close",estimated_hours:8,active:true,
    schedule:"monthly",    // monthly | weekly | biweekly | every_n_days
    schedule_day:4,        // 0-6 for weekday; N for every_n_days interval
    due_offset:1,          // days after start date = due date
    anchor_date:"",        // first known occurrence — ensures correct cross-month intervals
  });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  // Derived: preview of generated dates — mirrors Code.gs logic exactly
  const previewDates=useMemo(()=>{
    const now=new Date(),y=now.getFullYear(),m=now.getMonth();
    const monthStart=new Date(y,m,1);
    const monthEnd=new Date(y,m+1,0);
    const fmt=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
    const off=Number(f.due_offset)||1;

    // Get all occurrences within the month given anchor + interval (mirrors Code.gs getOccurrencesInMonth)
    const getOccs=(anchorStr,interval)=>{
      let anchor=anchorStr?new Date(anchorStr+"T00:00:00"):null;
      if(!anchor){
        // No anchor set: use the first matching weekday in the CURRENT month as a preview fallback.
        // This is just for the preview — real generation REQUIRES anchor_date in template.
        const weekday=(f.schedule==="every_n_days")?1:Number(f.schedule_day)||4;
        const ref=new Date(y,m,1);
        while(ref.getDay()!==weekday)ref.setDate(ref.getDate()+1);
        anchor=ref;
      }
      // Walk anchor to first occurrence >= monthStart
      let cur=new Date(anchor);
      if(cur>monthStart){
        const diff=Math.ceil((cur-monthStart)/(interval*86400000));
        cur.setDate(cur.getDate()-diff*interval);
      }
      while(cur<monthStart)cur.setDate(cur.getDate()+interval);
      if(cur>monthEnd)return[];
      const results=[];
      while(cur<=monthEnd){results.push(new Date(cur));cur=new Date(cur);cur.setDate(cur.getDate()+interval);}
      return results;
    };

    if(f.schedule==="monthly"){
      const s=new Date(y,m,1);return [{start:fmt(s),due:fmt(addD(s,off))}];
    }
    if(f.schedule==="weekly"){
      return getOccs(f.anchor_date,7).map(d=>({start:fmt(d),due:fmt(addD(d,off))}));
    }
    if(f.schedule==="biweekly"){
      return getOccs(f.anchor_date,14).map(d=>({start:fmt(d),due:fmt(addD(d,off))}));
    }
    if(f.schedule==="every_n_days"){
      const n=Number(f.schedule_day)||14;
      return getOccs(f.anchor_date,n).map(d=>({start:fmt(d),due:fmt(addD(d,off))}));
    }
    return [];
  },[f.schedule,f.schedule_day,f.due_offset,f.anchor_date]);

  const scheduleLabel={
    monthly:lang==="lo"?"ເດືອນລະຄັ້ງ (ວັນທີ 1)":"Once a month (1st of month)",
    weekly:lang==="lo"?"ທຸກ 7 ວັນ (ທຸກອາທິດ)":"Every 7 days (weekly)",
    biweekly:lang==="lo"?"ທຸກ 14 ວັນ (ສອງອາທິດຄັ້ງ)":"Every 14 days (bi-weekly, true interval)",
    every_n_days:lang==="lo"?"ທຸກ N ວັນ (ກຳນົດເອງ)":"Every N days (custom interval)",
  };

  return <Modal title={initial?(lang==="lo"?"ແກ້ໄຂແມ່ແບບ":"Edit Template"):(lang==="lo"?"ແມ່ແບບໃໝ່":"New Template")} onClose={onClose} onSave={()=>onSave(f)} wide>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div style={{gridColumn:"1/-1"}}><Lbl label={t.jobTitle+" (EN)"}><input value={f.title} onChange={e=>set("title",e.target.value)} style={IS()}/></Lbl></div>
      <div style={{gridColumn:"1/-1"}}><Lbl label={t.jobTitle+" (ລາວ)"}><input value={f.title_lao||""} onChange={e=>set("title_lao",e.target.value)} style={IS()}/></Lbl></div>
      <div style={{gridColumn:"1/-1"}}><Lbl label={t.desc}><textarea value={f.description||""} onChange={e=>set("description",e.target.value)} style={{...IS(),height:50,resize:"vertical"}}/></Lbl></div>
      <Lbl label={t.category}><select value={f.category||""} onChange={e=>set("category",e.target.value)} style={IS()}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select></Lbl>
      <Lbl label={t.priority}><select value={f.priority} onChange={e=>set("priority",e.target.value)} style={IS()}>{Object.entries(PRIORITY).map(([k,v])=><option key={k} value={k}>{v[lang]||v.en}</option>)}</select></Lbl>
      <Lbl label={t.project}><select value={f.project_id||""} onChange={e=>set("project_id",e.target.value)} style={IS()}><option value="">-- None --</option>{projects.map(p=><option key={p.id} value={p.id}>{lang==="lo"&&p.name_lao?p.name_lao:p.name}</option>)}</select></Lbl>
      <Lbl label={t.estHrs}><input type="number" min="1" value={f.estimated_hours||8} onChange={e=>set("estimated_hours",+e.target.value)} style={IS()}/></Lbl>
      {user.role==="leader"&&<div style={{gridColumn:"1/-1"}}><Lbl label={t.assignee+" (default)"}><select value={f.default_assignee_id||user.id} onChange={e=>set("default_assignee_id",e.target.value)} style={IS()}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Lbl></div>}

      {/* ── SCHEDULE SECTION ── */}
      <div style={{gridColumn:"1/-1",borderTop:`1px solid ${DK.bdr3()}`,paddingTop:14,marginTop:4}}>
        <div style={{fontSize:11,fontWeight:700,color:DK.txt3(),textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>⏰ {lang==="lo"?"ຕາຕະລາງ / ຄວາມຖີ່":"Schedule / Frequency"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

          {/* Schedule type */}
          <Lbl label={lang==="lo"?"ຄວາມຖີ່":"Frequency"}>
            <select value={f.schedule} onChange={e=>{
              const v=e.target.value;
              set("schedule",v);
              if(v==="biweekly")set("schedule_day",4);
              if(v==="every_n_days")set("schedule_day",14);
              if(v==="monthly"){set("due_offset",10);set("anchor_date","");}
              if(v!=="monthly")set("due_offset",1);
            }} style={IS()}>
              {Object.entries(scheduleLabel).map(([k,l])=><option key={k} value={k}>{l}</option>)}
            </select>
          </Lbl>

          {/* Day of week (weekly / biweekly) */}
          {(f.schedule==="weekly"||f.schedule==="biweekly")&&<Lbl label={lang==="lo"?"ວັນໃນອາທິດ":"Day of Week"}>
            <select value={Number(f.schedule_day)} onChange={e=>set("schedule_day",+e.target.value)} style={IS()}>
              {DAYS_EN.map((d,i)=><option key={i} value={i}>{lang==="lo"?DAYS_LO[i]:d}</option>)}
            </select>
          </Lbl>}

          {/* Every N days interval */}
          {f.schedule==="every_n_days"&&<Lbl label={lang==="lo"?"ທຸກກີ່ວັນ":"Every N Days"}>
            <input type="number" min="1" max="30" value={Number(f.schedule_day)||14} onChange={e=>set("schedule_day",+e.target.value)} style={IS()}/>
          </Lbl>}

          {/* Due offset */}
          {f.schedule==="monthly"&&<Lbl label={lang==="lo"?"ຄົບກໍານົດ (ວັນທີ 1 + N)":"Due Offset from 1st (days)"}>
            <input type="number" min="0" max="30" value={Number(f.due_offset)||10} onChange={e=>set("due_offset",+e.target.value)} style={IS()}/>

          {f.schedule!=="monthly"&&<Lbl label={lang==="lo"?"ຄົບກໍານົດ ຫຼັງ N ວັນ (T+N)":"Due Date: T + N days"}>
            <input type="number" min="0" max="14" value={Number(f.due_offset)||1} onChange={e=>set("due_offset",+e.target.value)} style={IS()}/>
          </Lbl>}

          {/* ── ANCHOR DATE — critical for weekly/biweekly/every_n_days ── */}
          {f.schedule!=="monthly"&&<div style={{gridColumn:"1/-1"}}>
            <Lbl label={lang==="lo"?"ວັນທີ່ທຳອິດ (Anchor Date) *ສຳຄັນ":"First Occurrence Date (Anchor) *Required"}>
              <input type="date" value={f.anchor_date||""} onChange={e=>set("anchor_date",e.target.value)} style={IS()}/>
            </Lbl>
            <div style={{fontSize:11,color:DK.txt4(),marginTop:-8,marginBottom:4,padding:"6px 10px",background:"#fefce8",borderRadius:6,border:"1px solid #fde68a",lineHeight:1.6}}>
              ⚠️ <strong>{lang==="lo"?"ຕ້ອງລະບຸ:":"Must set:"}</strong> {lang==="lo"
                ?"ເລືອກວັນທີ່ທີ່ວຽກນີ້ຈະເຮັດຄັ້ງທໍາອິດ ຈາກນັ້ນລະບົບຈະຄຳນວນ interval ໂດຍອໍາໂນມັດ (ຖ້າຕ້ອງການທຸກ 14 ວັນ ໃສ່ວັນພະຫັດຄັ້ງທໍາອິດ)"
                :"Pick the exact date this job first runs. The system counts forward by the interval from there — ensuring correct weeks every month. Example: first Thursday = Apr 3, 2025 → every 14 days from that date."}
            </div>
          </div>}
        </div>

        {/* Preview box */}
        <div style={{marginTop:12,padding:"12px 14px",background:"#f0f9ff",borderRadius:8,border:"1px solid #bfdbfe"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8",marginBottom:8}}>
            📅 {lang==="lo"?"ຕົວຢ່າງ ສຳລັບເດືອນ":"Preview for"} {new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"})}
            {f.schedule!=="monthly"&&!f.anchor_date&&<span style={{color:"#f59e0b",fontWeight:400,marginLeft:8}}>← {lang==="lo"?"ໃສ່ Anchor Date ກ່ອນ":"Set anchor date above for accurate preview"}</span>}
          </div>
          {previewDates.length>0
            ?<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {previewDates.map((d,i)=>(
                <div key={i} style={{background:DK.bg(),borderRadius:6,padding:"6px 12px",border:"1px solid #bfdbfe",fontSize:12,lineHeight:1.5}}>
                  <div style={{fontWeight:700,color:"#1d4ed8",fontSize:10,marginBottom:1}}>Occurrence #{i+1}</div>
                  <div style={{color:DK.txt3()}}>▶ {d.start}</div>
                  <div style={{color:DK.txt4()}}>✓ Due {d.due}</div>
                </div>
              ))}
            </div>
            :<div style={{color:DK.txt5(),fontSize:12}}>
              {f.schedule==="monthly"?"1 job on the 1st of the month":f.anchor_date?"No occurrences fall in this month with that anchor":"Set an anchor date to see the preview"}
            </div>
          }
          {/* Explanation of how the interval works */}
          {f.schedule!=="monthly"&&previewDates.length>0&&<div style={{marginTop:10,fontSize:11,color:"#1d4ed8",padding:"6px 10px",background:"rgba(255,255,255,0.7)",borderRadius:6}}>
            💡 {f.schedule==="biweekly"
              ?(lang==="lo"
                ?`ທຸກ 14 ວັນ ຈາກ ${f.anchor_date||"anchor"} — ໄດ້ ${previewDates.length} ຄັ້ງ ໃນເດືອນນີ້`
                :`Every 14 days from anchor — ${previewDates.length} occurrence${previewDates.length!==1?"s":""} this month. Weeks stay correct across month boundaries.`)
              :f.schedule==="weekly"
              ?(lang==="lo"
                ?`ທຸກ 7 ວັນ — ໄດ້ ${previewDates.length} ຄັ້ງ ໃນເດືອນນີ້`
                :`Every 7 days — ${previewDates.length} occurrence${previewDates.length!==1?"s":""} this month.`)
              :(lang==="lo"
                ?`ທຸກ ${Number(f.schedule_day)||14} ວັນ — ໄດ້ ${previewDates.length} ຄັ້ງ ໃນເດືອນນີ້`
                :`Every ${Number(f.schedule_day)||14} days — ${previewDates.length} occurrence${previewDates.length!==1?"s":""} this month.`)
            }
          </div>}
        </div>
      </div>

      {/* Active toggle */}
      <div style={{gridColumn:"1/-1"}}><Lbl label={lang==="lo"?"ສະຖານະ":"Active (auto-generate?)"}><div style={{display:"flex",gap:10}}>{[true,false].map(v=><button key={String(v)} type="button" onClick={()=>set("active",v)} style={{flex:1,padding:"9px",borderRadius:8,border:`2px solid ${f.active===v?"#2563eb":"#e2e8f0"}`,background:f.active===v?"#eff6ff":"#fff",color:f.active===v?"#2563eb":"#94a3b8",fontWeight:700,fontSize:13}}>{v?(lang==="lo"?"✓ ໃຊ້ງານ":"✓ Active"):(lang==="lo"?"✗ ປິດ":"✗ Off")}</button>)}</div></Lbl></div>
    </div>
  </Modal>;
}

// ── TIMELINE PAGE ──────────────────────────────────────────────
function TimelinePage({projects,jobs,getUser,users,lang}){
  const t=T[lang];
  const [selProj,setSelProj]=useState("all");
  const [fUser,setFUser]=useState("all");
  const [tooltip,setTooltip]=useState(null); // {x,y,content}
  const now=new Date();
  const sc={active:"#2563eb",planning:"#7c3aed",completed:"#16a34a",paused:"#f59e0b"};

  // Compute date range
  const allDates=[
    ...projects.flatMap(p=>[p.start_date,p.due_date]),
    ...jobs.flatMap(j=>[j.start_date,j.due_date])
  ].filter(Boolean).map(d=>new Date(String(d).slice(0,10)));
  const rawMin=allDates.length?new Date(Math.min(...allDates)):new Date();
  const rawMax=allDates.length?new Date(Math.max(...allDates)):new Date(now.getFullYear(),now.getMonth()+3,1);
  // Snap to month boundaries + 1 month padding each side
  const minDate=new Date(rawMin.getFullYear(),rawMin.getMonth()-0,1);
  const maxDate=new Date(rawMax.getFullYear(),rawMax.getMonth()+2,0); // last day of month after max
  const totalMs=maxDate-minDate||1;
  const totalDays=Math.round(totalMs/(1000*60*60*24));

  // Convert date to % position
  const toX=d=>{
    if(!d)return null;
    const dd=new Date(String(d).slice(0,10));
    return Math.max(0,Math.min(100,(dd-minDate)/totalMs*100));
  };
  const toW=(s,e)=>{
    if(!s||!e)return 0;
    const sd=new Date(String(s).slice(0,10)),ed=new Date(String(e).slice(0,10));
    return Math.max(0.3,(ed-sd)/totalMs*100);
  };

  // Build day tick marks: show every 7 days (weekly) if range ≤ 90 days, else monthly
  const DAY_MS=1000*60*60*24;
  const ticks=[];
  const useWeekly=totalDays<=120;
  let cur=new Date(minDate);
  while(cur<=maxDate){
    const x=toX(cur.toISOString().slice(0,10));
    const isMonthStart=cur.getDate()===1;
    const isToday=cur.toDateString()===now.toDateString();
    ticks.push({
      x,
      label:isMonthStart
        ?cur.toLocaleDateString("en-US",{month:"short",year:"2-digit"})
        :cur.toLocaleDateString("en-US",{month:"short",day:"numeric"}),
      isMonth:isMonthStart,
      isToday,
      date:new Date(cur)
    });
    if(useWeekly){cur=new Date(cur.getTime()+7*DAY_MS);}
    else{cur.setMonth(cur.getMonth()+1);}
  }

  const todayX=toX(now.toISOString().slice(0,10));

  const visibleProjects=(selProj==="all"?projects:projects.filter(p=>p.id===selProj));

  // PDF export
  const printTimeline=()=>{
    const win=window.open("","_blank");
    if(!win){notify("Please allow popups","error");return;}

    // Build SVG gantt chart for PDF
    const SVG_W=900;
    const LABEL_COL=200;
    const BAR_W=SVG_W-LABEL_COL-20;
    const ROW_H=28;
    const HEADER_H=44;

    // All jobs for visible projects filtered by user
    const allPjs=visibleProjects.flatMap(p=>jobs.filter(j=>j.project_id===p.id&&(fUser==="all"||j.assignee_id===fUser)));
    const allDates2=[...visibleProjects.flatMap(p=>[p.start_date,p.due_date]),...allPjs.flatMap(j=>[j.start_date,j.due_date])].filter(Boolean).map(d=>new Date(String(d).slice(0,10)));
    const svgMin=allDates2.length?new Date(Math.min(...allDates2)):new Date();
    const svgMax=allDates2.length?new Date(Math.max(...allDates2)):new Date(now.getFullYear(),now.getMonth()+3,1);
    svgMin.setDate(1);
    svgMax.setMonth(svgMax.getMonth()+1,1);
    const svgTotalMs=svgMax-svgMin||1;
    const toSvgX=d=>{if(!d)return null;return LABEL_COL+Math.max(0,Math.min(BAR_W,(new Date(String(d).slice(0,10))-svgMin)/svgTotalMs*BAR_W));};
    const toSvgW=(s,e)=>{if(!s||!e)return 0;return Math.max(2,(new Date(String(e).slice(0,10))-new Date(String(s).slice(0,10)))/svgTotalMs*BAR_W);};

    // Month ticks for SVG
    const svgTicks=[];let svgCur=new Date(svgMin);
    while(svgCur<=svgMax){svgTicks.push({x:toSvgX(svgCur.toISOString().slice(0,10)),label:svgCur.toLocaleDateString("en-US",{month:"short",year:"2-digit"})});svgCur.setMonth(svgCur.getMonth()+1);}

    const todaySvgX=toSvgX(now.toISOString().slice(0,10));

    // Build SVG rows
    let rows=[];let y=HEADER_H;
    const svgBgColors=["#ffffff","#f9fafb"];
    visibleProjects.forEach((p,pi)=>{
      const pj=jobs.filter(j=>j.project_id===p.id&&(fUser==="all"||j.assignee_id===fUser));
      const dn=pj.filter(j=>j.status==="done").length;
      const pct2=pj.length?Math.round(dn/pj.length*100):0;
      const projColor={"active":"#2563eb","planning":"#7c3aed","completed":"#16a34a","paused":"#f59e0b"}[p.status]||"#94a3b8";
      const pname=lang==="lo"&&p.name_lao?p.name_lao:p.name;
      const px=toSvgX(p.start_date);const pw=toSvgW(p.start_date,p.due_date);

      // Project row
      rows.push(`<rect x="0" y="${y}" width="${SVG_W}" height="${ROW_H}" fill="#f0f4f8"/>`);
      rows.push(`<rect x="0" y="${y}" width="4" height="${ROW_H}" fill="${projColor}"/>`);
      rows.push(`<text x="8" y="${y+ROW_H*0.65}" font-size="11" font-weight="700" fill="#0f172a" font-family="'Noto Sans','Noto Sans Lao',Arial,sans-serif">${pname}</text>`);
      rows.push(`<text x="8" y="${y+ROW_H*0.9}" font-size="8" fill="#94a3b8" font-family="Arial,sans-serif">${dn}/${pj.length} done · ${pct2}% · Due ${cleanDate(p.due_date)}</text>`);
      if(px!==null&&pw>0){
        rows.push(`<rect x="${px}" y="${y+6}" width="${pw}" height="${ROW_H-12}" rx="4" fill="${projColor}" opacity="0.85"/>`);
        rows.push(`<rect x="${px}" y="${y+6}" width="${Math.min(pw*pct2/100,pw)}" height="${ROW_H-12}" rx="4" fill="white" opacity="0.3"/>`);
        if(pw>40)rows.push(`<text x="${px+6}" y="${y+ROW_H*0.65}" font-size="9" fill="white" font-weight="700" font-family="Arial,sans-serif">${pct2}%</text>`);
      }
      y+=ROW_H;

      // Job rows
      pj.sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9)).forEach((j,ji)=>{
        const jname=lang==="lo"&&j.title_lao?j.title_lao:j.title;
        const od=new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done";
        const jColor=j.status==="done"?"#16a34a":od?"#dc2626":{"in-progress":"#2563eb","review":"#7c3aed","todo":"#94a3b8","blocked":"#dc2626"}[j.status]||"#64748b";
        const pg=Number(j.progress)||0;
        const jx=toSvgX(j.start_date);const jw=toSvgW(j.start_date,j.due_date);
        const dueX=toSvgX(j.due_date);
        rows.push(`<rect x="0" y="${y}" width="${SVG_W}" height="${ROW_H-2}" fill="${svgBgColors[ji%2]}"/>`);
        rows.push(`<text x="22" y="${y+ROW_H*0.6}" font-size="10" fill="${od?"#dc2626":j.status==="done"?"#94a3b8":"#374151"}" font-family="'Noto Sans','Noto Sans Lao',Arial,sans-serif" text-decoration="${j.status==="done"?"line-through":"none"}">${jname.slice(0,28)}${jname.length>28?"…":""}</text>`);
        rows.push(`<text x="22" y="${y+ROW_H*0.88}" font-size="8" fill="#94a3b8" font-family="Arial,sans-serif">${STATUS[j.status]?.en||j.status} · ${od?"⚠ ":""}${cleanDate(j.due_date)}</text>`);
        if(jx!==null&&jw>0){
          rows.push(`<rect x="${jx}" y="${y+7}" width="${Math.max(jw,2)}" height="${ROW_H-16}" rx="3" fill="${jColor}" opacity="0.15" stroke="${jColor}" stroke-width="1.5"/>`);
          if(pg>0)rows.push(`<rect x="${jx}" y="${y+7}" width="${Math.max(jw*pg/100,1)}" height="${ROW_H-16}" rx="3" fill="${jColor}" opacity="0.45"/>`);
        }
        // Due date diamond
        if(dueX!==null){
          rows.push(`<polygon points="${dueX},${y+5} ${dueX+5},${y+ROW_H/2} ${dueX},${y+ROW_H-5} ${dueX-5},${y+ROW_H/2}" fill="${od?"#dc2626":jColor}"/>`);
          rows.push(`<text x="${dueX+7}" y="${y+ROW_H*0.65}" font-size="8" fill="${od?"#dc2626":"#64748b"}" font-family="Arial,sans-serif">${cleanDate(j.due_date)}</text>`);
        }
        y+=ROW_H;
      });
    });

    const SVG_H=y+10;

    // Build header row with month ticks
    const headerRows=[
      `<rect x="0" y="0" width="${SVG_W}" height="${HEADER_H}" fill="#0f172a"/>`,
      `<text x="8" y="28" font-size="11" font-weight="700" fill="white" font-family="Arial,sans-serif">Project / Job</text>`,
      ...svgTicks.map(tk=>[
        `<line x1="${tk.x}" y1="0" x2="${tk.x}" y2="${SVG_H}" stroke="#e8edf5" stroke-width="0.5" opacity="0.3"/>`,
        `<text x="${tk.x+3}" y="26" font-size="9" fill="#93c5fd" font-family="Arial,sans-serif">${tk.label}</text>`,
        `<line x1="${tk.x}" y1="0" x2="${tk.x}" y2="${HEADER_H}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`
      ].join("")),
    ];

    // Today line
    if(todaySvgX!==null){
      rows.push(`<line x1="${todaySvgX}" y1="${HEADER_H}" x2="${todaySvgX}" y2="${SVG_H}" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>`);
      headerRows.push(`<line x1="${todaySvgX}" y1="0" x2="${todaySvgX}" y2="${HEADER_H}" stroke="#ef4444" stroke-width="2"/>`);
      headerRows.push(`<text x="${todaySvgX+3}" y="40" font-size="9" fill="#ef4444" font-weight="700" font-family="Arial,sans-serif">TODAY</text>`);
    }

    const svgContent=`<svg xmlns="http://www.w3.org/2000/svg" width="${SVG_W}" height="${SVG_H}" style="font-family:'Noto Sans',Arial,sans-serif">
      ${headerRows.join("")}
      ${rows.join("")}
    </svg>`;

    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>FS Taskflow Timeline</title>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet"/>
      <style>
        *{box-sizing:border-box}
        body{font-family:'Noto Sans','Noto Sans Lao',Arial,sans-serif;padding:20px 24px;font-size:12px;color:#1e293b;margin:0}
        h1{font-size:16px;margin:0 0 4px;color:#0f172a}
        .meta{color:#64748b;font-size:10px;margin-bottom:16px;border-bottom:1px solid #e2e8f0;padding-bottom:8px}
        .chart{border:1px solid #e8edf5;border-radius:6px;overflow:hidden;max-width:100%}
        .legend{display:flex;gap:16px;margin-bottom:12px;font-size:11px;color:#64748b;flex-wrap:wrap}
        .dot{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}
        @media print{body{padding:8px 12px}@page{size:A4 landscape;margin:12mm}}
      </style></head><body>
      <h1>&#128202; FS Taskflow &mdash; Project Timeline</h1>
      <div class="meta">Generated: ${now.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})} &nbsp;|&nbsp; ${fUser==="all"?"All Staff":users.find(u=>u.id===fUser)?.name||""}</div>
      <div class="legend">
        <span><span class="dot" style="background:#2563eb"></span>Active</span>
        <span><span class="dot" style="background:#7c3aed"></span>Planning</span>
        <span><span class="dot" style="background:#16a34a"></span>Completed</span>
        <span><span class="dot" style="background:#f59e0b"></span>Paused</span>
        <span><span style="display:inline-block;width:12px;height:2px;background:#ef4444;vertical-align:middle;margin-right:4px"></span>Today</span>
        <span>&#9670; = Due date</span>
      </div>
      <div class="chart">${svgContent}</div>
    </body></html>`);
    win.document.close();
    setTimeout(()=>win.print(),1000);
    notify("Timeline PDF ready!");
  };

  const LABEL_W=200;

  return <div style={{animation:"fadeUp 0.3s ease"}}>
    {/* Controls — single compact row */}
    <div style={{background:DK.bg(),borderRadius:12,padding:"10px 14px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",gap:8,alignItems:"center",flexWrap:"nowrap",overflowX:"auto"}}>
      <div style={{fontWeight:700,color:DK.txt(),fontSize:14,flexShrink:0}}>📊 {lang==="lo"?"ເສັ້ນທາງ":"Timeline"}</div>
      <select value={selProj} onChange={e=>setSelProj(e.target.value)} style={{...SS(),minWidth:130,maxWidth:160,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
        <option value="all">{t.allProjects}</option>
        {projects.map(p=><option key={p.id} value={p.id}>{lang==="lo"&&p.name_lao?p.name_lao:p.name}</option>)}
      </select>
      <select value={fUser} onChange={e=>setFUser(e.target.value)} style={{...SS(),minWidth:110,maxWidth:140,borderRadius:8,border:`1px solid ${DK.bdr()}`,fontSize:12}}>
        <option value="all">{lang==="lo"?"ທຸກຄົນ":"All Staff"}</option>
        {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      {/* Compact legend dots */}
      <div style={{display:"flex",gap:8,flexShrink:0}}>
        {Object.entries(sc).map(([k,c])=><span key={k} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:DK.txt4(),whiteSpace:"nowrap"}}>
          <span style={{width:10,height:10,borderRadius:2,background:c,display:"inline-block",flexShrink:0}}/>
          {k}
        </span>)}
        <span style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:DK.txt4(),whiteSpace:"nowrap"}}>
          <span style={{width:2,height:10,background:"#ef4444",display:"inline-block"}}/>Today
        </span>
      </div>
      <button onClick={printTimeline} style={{...BS("#dc2626"),padding:"6px 12px",fontSize:11,marginLeft:"auto",flexShrink:0}}>↓ PDF</button>
    </div>

    {/* Timeline chart */}
    <div style={{background:DK.bg(),borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden",position:"relative"}}>
      {/* Scrollable container */}
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:800,position:"relative"}}>

          {/* RULER HEADER */}
          <div style={{display:"flex",borderBottom:"2px solid #e8edf5",background:DK.bg2(),position:"sticky",top:0,zIndex:10}}>
            {/* Label column */}
            <div style={{width:LABEL_W,flexShrink:0,padding:"8px 14px",fontSize:11,fontWeight:700,color:DK.txt5(),borderRight:"1px solid #e8edf5"}}>
              {lang==="lo"?"ໂຄງການ / ວຽກ":"Project / Job"}
            </div>
            {/* Tick marks */}
            <div style={{flex:1,position:"relative",height:36,overflow:"hidden"}}>
              {/* Background grid lines */}
              {ticks.map((tk,i)=>(
                <div key={i} style={{position:"absolute",left:`${tk.x}%`,top:0,bottom:0,width:1,background:tk.isMonth?"#e8edf5":"#f1f5f9",zIndex:0}}/>
              ))}
              {/* Today red line in header */}
              {todayX!==null&&<div style={{position:"absolute",left:`${todayX}%`,top:0,bottom:0,width:2,background:"#ef4444",zIndex:3}}/>}
              {/* Tick labels */}
              {ticks.filter(tk=>tk.isMonth||useWeekly).map((tk,i)=>(
                <div key={i} style={{
                  position:"absolute",left:`${tk.x}%`,top:0,
                  transform:"translateX(-50%)",
                  fontSize:tk.isMonth?11:9,
                  fontWeight:tk.isMonth?700:400,
                  color:tk.isToday?"#ef4444":tk.isMonth?"#374151":"#94a3b8",
                  whiteSpace:"nowrap",paddingTop:tk.isMonth?6:10,
                  background:tk.isToday?"#fff4f4":"transparent",
                  padding:"4px 3px",borderRadius:3,
                }}>
                  {tk.isToday?"TODAY":tk.label}
                </div>
              ))}
            </div>
          </div>

          {/* PROJECT + JOB ROWS */}
          {visibleProjects.map(p=>{
            const pJobs=jobs.filter(j=>j.project_id===p.id&&(fUser==="all"||j.assignee_id===fUser));
            const dn=pJobs.filter(j=>j.status==="done").length;
            const projPct=pJobs.length?Math.round(dn/pJobs.length*100):0;
            const projColor=sc[p.status]||"#94a3b8";
            const pX=toX(p.start_date);
            const pW=toW(p.start_date,p.due_date);

            return <div key={p.id}>
              {/* PROJECT ROW */}
              <div style={{display:"flex",alignItems:"stretch",borderBottom:`1px solid ${DK.bdr2()}`,background:"#f4f6fb"}}>
                <div style={{width:LABEL_W,flexShrink:0,padding:"10px 14px",borderRight:"1px solid #e8edf5",borderLeft:`4px solid ${projColor}`}}>
                  <div style={{fontWeight:700,color:DK.txt(),fontSize:13}}>{lang==="lo"&&p.name_lao?p.name_lao:p.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                    <span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:projColor+"22",color:projColor,fontWeight:700,textTransform:"capitalize"}}>{p.status}</span>
                    <span style={{fontSize:10,color:DK.txt5()}}>{dn}/{pJobs.length} · {projPct}%</span>
                  </div>
                </div>
                {/* Project Gantt bar */}
                <div style={{flex:1,position:"relative",height:48,overflow:"visible"}}>
                  {/* Grid lines */}
                  {ticks.filter(tk=>tk.isMonth).map((tk,i)=>(
                    <div key={i} style={{position:"absolute",left:`${tk.x}%`,top:0,bottom:0,width:1,background:"#e8edf5",zIndex:0}}/>
                  ))}
                  {todayX!==null&&<div style={{position:"absolute",left:`${todayX}%`,top:0,bottom:0,width:2,background:"#ef4444",opacity:0.5,zIndex:4}}/>}
                  {pX!==null&&pW>0&&<div
                    style={{position:"absolute",left:`${pX}%`,width:`${pW}%`,top:10,height:28,borderRadius:6,background:projColor,minWidth:4,boxShadow:"0 2px 6px rgba(0,0,0,0.15)",cursor:"pointer",overflow:"hidden",zIndex:2}}
                    onMouseEnter={e=>{const r=e.currentTarget.getBoundingClientRect();setTooltip({x:r.left+r.width/2,y:r.top-8,content:[`📂 ${lang==="lo"&&p.name_lao?p.name_lao:p.name}`,`Status: ${p.status}`,`Start: ${cleanDate(p.start_date)}`,`Due: ${cleanDate(p.due_date)}`,`Progress: ${projPct}% (${dn}/${pJobs.length})`]});}}
                    onMouseLeave={()=>setTooltip(null)}>
                    {/* Progress fill */}
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${projPct}%`,background:"rgba(255,255,255,0.3)"}}/>
                    <span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#fff",fontWeight:700,whiteSpace:"nowrap"}}>{p.name?.slice(0,20)} {projPct}%</span>
                  </div>}
                  {/* Due date marker */}
                  {toX(p.due_date)!==null&&<div style={{position:"absolute",left:`${toX(p.due_date)}%`,top:8,width:2,height:32,background:projColor,opacity:0.4,zIndex:3}}/>}
                </div>
              </div>

              {/* JOB ROWS */}
              {pJobs.sort((a,b)=>(PO[a.priority]||9)-(PO[b.priority]||9)).map(j=>{
                const jX=toX(j.start_date);
                const jW=toW(j.start_date,j.due_date);
                const od=new Date(String(j.due_date).slice(0,10))<now&&j.status!=="done";
                const jColor=j.status==="done"?"#16a34a":od?"#dc2626":STATUS[j.status]?.c||"#94a3b8";
                const pg=Number(j.progress)||0;
                const dueX=toX(j.due_date);

                return <div key={j.id} style={{display:"flex",alignItems:"stretch",borderBottom:`1px solid ${DK.bdr3()}`,background:j.status==="done"?"#fafffe":"#fff",opacity:j.status==="done"?0.7:1}}>
                  {/* Label */}
                  <div style={{width:LABEL_W,flexShrink:0,padding:"7px 10px 7px 22px",borderRight:"1px solid #f1f5f9"}}>
                    <div style={{fontSize:12,color:j.status==="done"?"#94a3b8":"#374151",fontWeight:500,lineHeight:1.3}}>{lang==="lo"&&j.title_lao?j.title_lao:j.title}</div>
                    <div style={{display:"flex",alignItems:"center",gap:4,marginTop:2,flexWrap:"wrap"}}>
                      <Badge status={j.status} lang={lang}/>
                      <Avtr user={getUser(j.assignee_id)} size={14}/>
                      {od&&<span style={{fontSize:9,color:"#dc2626",fontWeight:700}}>⚠</span>}
                    </div>
                  </div>
                  {/* Bar area */}
                  <div style={{flex:1,position:"relative",height:38,overflow:"visible"}}>
                    {/* Grid */}
                    {ticks.filter(tk=>tk.isMonth).map((tk,i)=>(
                      <div key={i} style={{position:"absolute",left:`${tk.x}%`,top:0,bottom:0,width:1,background:"#f5f7fa",zIndex:0}}/>
                    ))}
                    {todayX!==null&&<div style={{position:"absolute",left:`${todayX}%`,top:0,bottom:0,width:2,background:"#ef4444",opacity:0.3,zIndex:4}}/>}

                    {/* Job bar */}
                    {jX!==null&&jW>0&&<div
                      style={{position:"absolute",left:`${jX}%`,width:`${Math.max(jW,0.5)}%`,top:9,height:20,borderRadius:4,background:jColor+"25",border:`1.5px solid ${jColor}`,minWidth:3,cursor:"pointer",overflow:"hidden",zIndex:2}}
                      onMouseEnter={e=>{const r=e.currentTarget.getBoundingClientRect();setTooltip({x:r.left+r.width/2,y:r.top-8,content:[`${lang==="lo"&&j.title_lao?j.title_lao:j.title}`,`Status: ${STATUS[j.status]?.en||j.status}`,`Priority: ${j.priority}`,`Start: ${cleanDate(j.start_date)}`,`Due: ${od?"⚠ ":""}${cleanDate(j.due_date)}`,`Progress: ${pg}%`,getUser(j.assignee_id)?.name?`Assignee: ${getUser(j.assignee_id).name}`:""]});}}
                      onMouseLeave={()=>setTooltip(null)}>
                      {/* Progress fill inside bar */}
                      <div style={{height:"100%",width:`${pg}%`,background:jColor,opacity:0.5}}/>
                    </div>}

                    {/* Due date diamond marker */}
                    {dueX!==null&&<div
                      style={{position:"absolute",left:`${dueX}%`,top:8,transform:"translateX(-50%)",width:10,height:10,background:od?"#dc2626":jColor,borderRadius:2,transform:"translateX(-50%) rotate(45deg)",zIndex:3,cursor:"pointer"}}
                      onMouseEnter={e=>{const r=e.currentTarget.getBoundingClientRect();setTooltip({x:r.left+5,y:r.top-8,content:[`Due: ${cleanDate(j.due_date)}`,od?"⚠ OVERDUE":"✓ On track"]});}}
                      onMouseLeave={()=>setTooltip(null)}
                    />}

                    {/* Date label on bar (if wide enough) */}
                    {jW>8&&<span style={{position:"absolute",left:`${jX}%`,top:10,fontSize:9,color:jColor,fontWeight:600,whiteSpace:"nowrap",marginLeft:3,zIndex:5}}>{cleanDate(j.due_date)}</span>}
                  </div>
                </div>;
              })}
            </div>;
          })}

          {visibleProjects.length===0&&<div style={{textAlign:"center",padding:40,color:DK.txt5()}}>{t.noJobs}</div>}
        </div>
      </div>
    </div>

    {/* Hover tooltip */}
    {tooltip&&<div style={{position:"fixed",left:tooltip.x,top:tooltip.y,transform:"translate(-50%,-100%)",background:"#0f172a",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:11,zIndex:9999,pointerEvents:"none",boxShadow:"0 4px 16px rgba(0,0,0,0.3)",maxWidth:220,whiteSpace:"pre-line"}}>
      {tooltip.content.filter(Boolean).join("\n")}
      <div style={{position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%)",width:10,height:10,background:"#0f172a",borderRadius:2,transform:"translateX(-50%) rotate(45deg)"}}/>
    </div>}
  </div>;
}


// ── REPORTS PAGE ───────────────────────────────────────────────
function ReportsPage({jobs,projects,users,user,getUser,lang}){
  const t=T[lang];
  const [tab,setTab]=useState("personal");
  const [period,setPeriod]=useState("month"); // week|month|quarter|year|all
  const now=new Date();

  // Period filter
  const periodStart=useMemo(()=>{
    const d=new Date();
    if(period==="week"){d.setDate(d.getDate()-7);}
    else if(period==="month"){d.setDate(1);}
    else if(period==="quarter"){d.setMonth(Math.floor(d.getMonth()/3)*3,1);}
    else if(period==="year"){d.setMonth(0,1);}
    else{return new Date(0);}
    d.setHours(0,0,0,0);return d;
  },[period]);

  const inPeriod=j=>{
    const u=new Date(String(j.updated_at||j.created_at||"").slice(0,10));
    return u>=periodStart;
  };

  // ── Helpers ────────────────────────────────────────────────
  const pct=(a,b)=>b?Math.round(a/b*100):0;
  const avgNum=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;

  // Stat card component
  const StatCard=({label,value,sub,color="#2563eb",icon})=>(
    <div style={{background:DK.bg(),borderRadius:12,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderTop:`3px solid ${color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:DK.txt5(),textTransform:"uppercase",letterSpacing:0.4,marginBottom:3}}>{label}</div>
          <div style={{fontSize:28,fontWeight:800,color:DK.txt()}}>{value}</div>
          {sub&&<div style={{fontSize:11,color:DK.txt4(),marginTop:3}}>{sub}</div>}
        </div>
        <div style={{width:38,height:38,borderRadius:10,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color}}>{icon}</div>
      </div>
    </div>
  );

  // Mini bar chart
  const BarChart=({data,height=80,color="#3b82f6"})=>{
    const max=Math.max(...data.map(d=>d.v),1);
    return <div style={{display:"flex",alignItems:"flex-end",gap:3,height,paddingTop:4}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:9,color:DK.txt5(),fontWeight:600}}>{d.v||""}</div>
          <div style={{width:"100%",background:color,borderRadius:"3px 3px 0 0",height:`${Math.max(4,Math.round(d.v/max*(height-20)))}px`,transition:"height 0.4s ease"}}/>
          <div style={{fontSize:9,color:DK.txt5(),whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",textAlign:"center"}}>{d.l}</div>
        </div>
      ))}
    </div>;
  };

  // Donut chart (simple SVG)
  const Donut=({segments,size=80})=>{
    const total=segments.reduce((s,sg)=>s+sg.v,0)||1;
    let offset=0;
    const r=30,cx=40,cy=40,circ=2*Math.PI*r;
    return <svg width={size} height={size} viewBox="0 0 80 80">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth="12"/>
      {segments.filter(sg=>sg.v>0).map((sg,i)=>{
        const dash=circ*(sg.v/total);
        const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={sg.c} strokeWidth="12"
          strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset*circ/total}
          transform="rotate(-90 40 40)" strokeLinecap="butt"/>;
        offset+=sg.v;return el;
      })}
    </svg>;
  };

  // ── PDF export ─────────────────────────────────────────────
  const exportReport=(title,html)=>{
    const win=window.open("","_blank");
    if(!win){notify("Please allow popups","error");return;}
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700&family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      *{box-sizing:border-box}
      body{font-family:'Noto Sans','Noto Sans Lao',Arial,sans-serif;padding:24px 28px;color:#1e293b;font-size:12px;line-height:1.6}
      h1{font-size:18px;color:#0f172a;margin:0 0 4px;font-weight:800}
      h2{font-size:13px;color:#374151;margin:16px 0 6px;border-bottom:2px solid #e2e8f0;padding-bottom:4px;font-weight:700}
      h3{font-size:12px;color:#374151;margin:10px 0 4px;font-weight:600}
      .meta{color:#64748b;font-size:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #e2e8f0}
      table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:11px}
      th{background:#0f172a;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-family:'Noto Sans',Arial,sans-serif}
      td{padding:6px 10px;border-bottom:1px solid #e2e8f0;vertical-align:top}
      tr:nth-child(even) td{background:#f8fafc}
      .badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;display:inline-block}
      .done{background:#f0fdf4;color:#16a34a}.in-progress{background:#eff6ff;color:#2563eb}
      .todo{background:#f1f5f9;color:#64748b}.blocked{background:#fef2f2;color:#dc2626}
      .review{background:#f5f3ff;color:#7c3aed}
      .stat-grid{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
      .stat{background:#f8fafc;border-radius:6px;padding:10px 14px;flex:1;min-width:90px;border-top:3px solid #3b82f6}
      .stat .n{font-size:20px;font-weight:800;color:#0f172a;font-family:'Noto Sans',Arial,sans-serif}
      .stat .l{font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:600;letter-spacing:0.5px}
      p.note{font-size:10px;color:#64748b;font-style:italic;margin:2px 0 12px}
      @media print{body{padding:10px 14px}@page{margin:12mm}}
    </style></head><body>${html}</body></html>`);
    win.document.close();
    setTimeout(()=>win.print(),900);
  };

  // ── TAB: PERSONAL ──────────────────────────────────────────
  const PersonalReport=()=>{
    const myAll=jobs.filter(j=>j.assignee_id===user.id);
    const my=myAll.filter(inPeriod);
    const done=my.filter(j=>j.status==="done");
    const inProg=my.filter(j=>j.status==="in-progress");

    const actTotal=my.reduce((s,j)=>s+(Number(j.actual_hours)||0),0);
    const avgProg=avgNum(my.map(j=>Number(j.progress)||0));
    const efficiency=estTotal?Math.round(estTotal/Math.max(actTotal,1)*100):100;
    const onTime=done.filter(j=>!j.due_date||new Date(String(j.due_date).slice(0,10))>=new Date(String(j.updated_at||j.created_at||"").slice(0,10)));

    const catMap={};myAll.forEach(j=>{if(!catMap[j.category||"Other"])catMap[j.category||"Other"]=0;catMap[j.category||"Other"]++;});

    // Priority breakdown
    const priBreak=Object.entries(PRIORITY).map(([k,v])=>({l:v.en,v:my.filter(j=>j.priority===k).length,c:v.c}));

    const printReport=()=>{
      // Group jobs by project for the PDF
      const grouped2={};
      my.forEach(j=>{const k=j.project_id||"__none__";if(!grouped2[k])grouped2[k]=[];grouped2[k].push(j);});

          <tr>
            <td><strong>${lang==="lo"&&j.title_lao?j.title_lao:j.title}</strong>${renderNotesHTML(j.notes)}</td>
            <td><span class="badge ${j.status}">${STATUS[j.status]?.en||j.status}</span></td>
            <td class="p ${j.priority}">${j.priority}</td>
            <td>${cleanDate(j.due_date)}</td>
            <td>${j.progress||0}%</td>
          </tr>`).join("");
        return `<h2>${projName}</h2>
          <table><thead><tr><th>Job / Notes</th><th>Status</th><th>Priority</th><th>Due</th><th>Progress</th></tr></thead>
          <tbody>${rows}</tbody></table>`;
      }).join("");
      exportReport(`Personal Report — ${user.name}`,`
        <h1>📋 Personal Performance Report</h1>
        <div class="meta">Period: ${period.toUpperCase()} · Employee: <strong>${user.name}</strong> · Department: ${user.department} · Generated: ${now.toLocaleDateString()}</div>

          <div class="stat" style="border-color:#2563eb"><div class="n">${my.length}</div><div class="l">Total Jobs</div></div>

          <div class="stat" style="border-color:#dc2626"><div class="n">${overdue.length}</div><div class="l">Overdue</div></div>
          <div class="stat" style="border-color:#059669"><div class="n">${done.length?pct(onTime.length,done.length):0}%</div><div class="l">On-Time Rate</div></div>
        </div>
        ${projSections}
      `);
    };

    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

        <button onClick={printReport} style={{...BS("#dc2626"),padding:"7px 16px",fontSize:13}}>↓ PDF</button>

      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:12,marginBottom:20}}>

        <StatCard label={lang==="lo"?"ສໍາເລັດ":"Done"} value={done.length} sub={`${pct(done.length,my.length)}% rate`} color="#16a34a" icon="✓"/>
        <StatCard label={lang==="lo"?"ຄວາມຄືບໜ້າ":"Avg Progress"} value={`${avgProg}%`} color="#7c3aed" icon="◑"/>
        <StatCard label={lang==="lo"?"ຊມ ລວມ":"Hours Logged"} value={`${actTotal}h`} sub={`of ${estTotal}h est.`} color="#f59e0b" icon="⏱"/>
        <StatCard label={lang==="lo"?"ເກີນກໍານົດ":"Overdue"} value={overdue.length} color="#dc2626" icon="⚠"/>
        <StatCard label={lang==="lo"?"ຕົງເວລາ":"On Time"} value={done.length?`${pct(onTime.length,done.length)}%`:"—"} color="#059669" icon="🎯"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 240px",gap:16,marginBottom:16}}>
        {/* Jobs by category bar */}
        <div style={{background:DK.bg(),borderRadius:12,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:13,fontWeight:700,color:DK.txt(),marginBottom:12}}>📁 {lang==="lo"?"ວຽກຕາມປະເພດ":"Jobs by Category"}</div>
          {catData.length?<BarChart data={catData} color="#3b82f6" height={100}/>:<div style={{color:DK.txt5(),fontSize:12,textAlign:"center",padding:20}}>No data</div>}

        <div style={{background:DK.bg(),borderRadius:12,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
