              <button onClick={e=>{e.stopPropagation();printJobCard(j,projects,getUser,lang);}} title="Print Card" style={{width:24,height:24,borderRadius:5,border:`1px solid ${DK.bdr()}`,background:DK.bg(),cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>🖨</button>
            </div>
          </div>
          {isEx&&<JobDetailPanel job={j} user={user} getUser={getUser} projects={projects} lang={lang} saving={saving}
            onSave={updated=>{onInlineUpdate(updated);setExpandedId(null);}}
            onClose={()=>setExpandedId(null)}/>}
        </div>;
      })}
      {meJobs.length===0&&<div style={{padding:40,textAlign:"center",color:DK.txt5(),fontSize:13}}>
        {lang==="lo"?"ບໍ່ມີວຽກສຳລັບເດືອນນີ້":"No jobs found for this month. Check your job due dates or generate monthly jobs."}
      </div>}
    </div>
  </div>;
}

// ── MAIN APP ───────────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState("en");
  const [user,setUser]=useState(null);
  const [users,setUsers]=useState([]);
  const [projects,setProjects]=useState([]);
  const [jobs,setJobs]=useState([]);
  const [monthly,setMonthly]=useState([]);
  const [pending,setPending]=useState([]);
  const [board,setBoard]=useState([]);
  const [page,setPage]=useState("dashboard");
  const [filterProj,setFilterProj]=useState(null); // for project→jobs drill-through
  const [dashFilter,setDashFilter]=useState(null);  // for stat card → jobs filtered
  const [modal,setModal]=useState(null);
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(false);
  const [generating,setGenerating]=useState(false);
  const [notif,setNotif]=useState(null);
  const t=T[lang];

  const notify=(msg,type="success")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3500);};

  const reload=async()=>{
    setLoading(true);
    try{const all=await apiGet({action:"getAll"});if(!all.error){setUsers(all.users||[]);setProjects(all.projects||[]);setJobs(all.jobs||[]);setMonthly(all.monthly||[]);setPending(all.pending||[]);setBoard(all.board||[]);}}
    catch(e){notify("Connection error","error");}
    setLoading(false);
  };

  const handleLogin=async(u,us,pr,jb,mo,pe,bd)=>{
    setUser(u);setUsers(us);setProjects(pr);setJobs(jb);setMonthly(mo||[]);setPending(pe||[]);setBoard(bd||[]);setPage("dashboard");
    notify(lang==="lo"?"ຍິນດີຕ້ອນຮັບ, ":"Welcome, "+u.name.split(" ")[0]);
    // Auto-generate monthly if 1st-3rd of month
    const now=new Date(),day=now.getDate(),m=now.getMonth()+1,y=now.getFullYear();
    const already=(jb||[]).some(j=>j.id&&j.id.startsWith("mj_")&&j.id.includes(`_${y}_${m}`));
    if(day<=3&&!already&&(mo||[]).some(tp=>tp.active===true||tp.active==="true"||tp.active===1)){
      try{const res=await apiPost({action:"generateMonthly"});if(res.success&&res.created>0){notify(`📅 ${res.created} monthly jobs for ${m}/${y}!`);const all=await apiGet({action:"getAll"});if(!all.error){setJobs(all.jobs||[]);setMonthly(all.monthly||[]);}}}catch(e){}
    }
  };

  const getUser=id=>users.find(u=>u.id===id)||null;
  const today=()=>new Date().toISOString().split("T")[0];

  // ── THEME (dark mode persisted) — must be before early return ──
  const [dark,setDark]=useState(()=>localStorage.getItem("fst_theme")==="dark");
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",dark?"dark":"light");window.__fstDark=dark;
    localStorage.setItem("fst_theme",dark?"dark":"light");
  },[dark]);

  const myJobs=jobs.filter(j=>user?.role==="runner"?j.assignee_id===user.id:true);
  const stats={total:myJobs.length,done:myJobs.filter(j=>j.status==="done").length,inProgress:myJobs.filter(j=>j.status==="in-progress").length,overdue:myJobs.filter(j=>new Date(j.due_date)<new Date()&&j.status!=="done").length};

  // CRUD
  const logActivity=async(jobId,action,comment)=>{
    try{
      await apiPost({action:"logActivity",payload:{
        id:"log"+Date.now(),job_id:jobId,user_id:user.id,
        action,timestamp:new Date().toISOString().slice(0,19).replace("T"," "),comment
      }});
    }catch(e){}
  };

  const saveJob=async(data,isNew)=>{
    setSaving(true);
    const payload=isNew?{...data,id:"j"+Date.now(),created_at:today(),updated_at:today()}:{...data,updated_at:today()};
    try{
      const res=await apiPost({action:isNew?"addJob":"updateJob",payload});
      if(res.error){notify("Error: "+res.error,"error");setSaving(false);return;}
      if(isNew)setJobs(p=>[...p,payload]);
      else setJobs(p=>p.map(j=>j.id===payload.id?payload:j));
      setModal(null);
      notify(t.saved);
      // Log activity to ACTIVITY_LOG sheet
      const oldJob=isNew?null:jobs.find(j=>j.id===payload.id);
      const changes=[];
      if(!isNew&&oldJob){
        if(oldJob.status!==payload.status)changes.push(`Status: ${oldJob.status}→${payload.status}`);
        if(oldJob.progress!==payload.progress)changes.push(`Progress: ${oldJob.progress||0}%→${payload.progress||0}%`);
        if(oldJob.actual_hours!==payload.actual_hours)changes.push(`Hours: ${oldJob.actual_hours||0}→${payload.actual_hours||0}`);
        if(oldJob.notes!==payload.notes&&payload.notes)changes.push("Notes updated");
      }
      const action=isNew?"created":changes.length?changes.join(", "):"updated";
      logActivity(payload.id,isNew?"job_created":"job_updated",action);
      // Auto-reload from Google Sheets to confirm sync
      setTimeout(async()=>{
        try{const all=await apiGet({action:"getAll"});if(!all.error){setJobs(all.jobs||[]);}}catch(e){}
      },800);
    }
    catch(e){notify("Save failed","error");}
    setSaving(false);
  };
  const deleteJob=async(id)=>{
    if(!window.confirm("Delete this job?"))return;
    try{await apiPost({action:"deleteJob",id});setJobs(p=>p.filter(j=>j.id!==id));notify("Deleted","info");}catch(e){notify("Error","error");}
  };
  const saveProject=async(data,isNew)=>{
    setSaving(true);
    const payload=isNew?{...data,id:"p"+Date.now(),created_at:today()}:data;
    try{const res=await apiPost({action:isNew?"addProject":"updateProject",payload});if(res.error){notify("Error: "+res.error,"error");setSaving(false);return;}if(isNew)setProjects(p=>[...p,payload]);else setProjects(p=>p.map(j=>j.id===payload.id?payload:j));setModal(null);notify(t.saved);}
    catch(e){notify("Save failed","error");}
    setSaving(false);
  };
  const deleteProject=async(id)=>{if(!window.confirm("Delete?"))return;try{await apiPost({action:"deleteProject",id});setProjects(p=>p.filter(j=>j.id!==id));notify("Deleted","info");}catch(e){notify("Error","error");}};
  const saveUser=async(data,isNew)=>{
    setSaving(true);
    const payload=isNew?{...data,id:"u"+Date.now(),created_at:today()}:{...data};
    if(!payload.avatar)payload.avatar=(payload.name||"U").slice(0,2).toUpperCase();
    if(!isNew&&!payload.password)delete payload.password;
    try{const res=await apiPost({action:isNew?"addUser":"updateUser",payload});if(res.error){notify("Error: "+res.error,"error");setSaving(false);return;}if(isNew)setUsers(p=>[...p,payload]);else setUsers(p=>p.map(u=>u.id===payload.id?{...u,...payload}:u));setModal(null);notify(t.saved);}
    catch(e){notify("Save failed","error");}
    setSaving(false);
  };
  const deleteUser=async(id)=>{if(!window.confirm("Delete user?"))return;try{await apiPost({action:"deleteUser",id});setUsers(p=>p.filter(u=>u.id!==id));notify("Deleted","info");}catch(e){notify("Error","error");}};
  const saveTemplate=async(data,isNew)=>{
    setSaving(true);
    const payload=isNew?{...data,id:"mt"+Date.now(),owner_id:user.id,default_assignee_id:data.default_assignee_id||user.id}:{...data};
    try{const res=await apiPost({action:isNew?"addMonthlyTemplate":"updateMonthlyTemplate",payload});if(res.error){notify("Error: "+res.error,"error");setSaving(false);return;}if(isNew)setMonthly(p=>[...p,payload]);else setMonthly(p=>p.map(tp=>tp.id===payload.id?payload:tp));notify("Template saved!");}
    catch(e){notify("Save failed","error");}
    setSaving(false);
  };
  const deleteTemplate=async(id)=>{if(!window.confirm("Delete template?"))return;try{await apiPost({action:"deleteMonthlyTemplate",id});setMonthly(p=>p.filter(tp=>tp.id!==id));notify("Deleted","info");}catch(e){notify("Error","error");}};
  const submitRequest=async(data)=>{
    setSaving(true);
    const payload={...data,id:"req"+Date.now(),approval_status:"pending",requested_by:user.id,request_date:today(),status:"todo"};

        {page==="monthend"&&<MonthEndPage jobs={jobs} projects={projects} users={users} user={user} getUser={getUser} lang={lang} onInlineUpdate={j=>saveJob(j,false)} saving={saving} onEdit={j=>setModal({type:"editJob",data:j})}/>}
        {page==="pending"&&<PendingPage pending={pending} user={user} getUser={getUser} onApprove={approveJob} onReject={rejectJob} lang={lang}/>}
        {page==="timeline"&&<TimelinePage projects={projects} jobs={jobs} getUser={getUser} users={users} lang={lang}/>}
        {page==="board"&&<BoardPage board={board} user={user} users={users} getUser={getUser} onAddNote={addNote} onEditNote={editNote} onDeleteNote={deleteNote} lang={lang}/>}
        {page==="reports"&&<ReportsPage jobs={jobs} projects={projects} users={users} user={user} getUser={getUser} lang={lang}/>}
        {page==="activitylog"&&<ActivityLogPage jobs={jobs} users={users} getUser={getUser} lang={lang}/>}
      </div>
    </main>

    {/* Modals */}
    {(modal?.type==="addJob"||modal?.type==="editJob")&&<JobFormModal initial={modal.data} onClose={()=>setModal(null)} onSave={data=>saveJob(data,!modal.data)} projects={projects} users={users} user={user} lang={lang} saving={saving}/>}
    {modal?.type==="requestJob"&&<JobRequestModal onClose={()=>setModal(null)} onSave={submitRequest} projects={projects} users={users} user={user} lang={lang} saving={saving}/>}
    {(modal?.type==="addProject"||modal?.type==="editProject")&&<ProjectModal initial={modal.data} onClose={()=>setModal(null)} onSave={data=>saveProject(data,!modal.data)} users={users} saving={saving} lang={lang}/>}
    {(modal?.type==="addUser"||modal?.type==="editUser")&&<UserModal initial={modal.data} onClose={()=>setModal(null)} onSave={data=>saveUser(data,!modal.data)} saving={saving} lang={lang}/>}

    {user&&<DueTodayBanner jobs={jobs} user={user} lang={lang} onOpenJob={j=>setModal({type:"editJob",data:j})}/>}
    {notif&&<div style={{position:"fixed",bottom:20,right:20,padding:"11px 18px",borderRadius:10,background:notif.type==="success"?"#16a34a":notif.type==="info"?"#2563eb":"#dc2626",color:"#fff",fontWeight:600,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",zIndex:9999,animation:"fadeUp 0.3s ease"}}>{notif.msg}</div>}
  </div>;
  }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
